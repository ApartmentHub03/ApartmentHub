/* Block F — server-side resume hydration.
   In live mode, try to pull the seller's prior dossier and file list from
   Supabase via /api/verkoop/dossier. The session cookie is set by /login-selling.
   - Pre-fills step-1 form inputs (skips fields the user just typed)
   - Replaces uploaded[] with server's current file list (each marked as 'uploaded')
   - Silent no-op if there's no dossier yet or if we're in DEMO mode */
async function hydrateFromServer() {
  if (DEMO) return;
  try {
    const res = await fetch(DOSSIER_URL, { credentials: "same-origin" });
    if (!res.ok) return;
    const data = await res.json();

    // Even with no dossier row yet, the session phone is known — surface
    // it in the locked chip so step 1 isn't empty for first-time sellers.
    if (!data.dossier) {
      const lockedEl = document.getElementById("phoneLockedValue");
      if (lockedEl && data.seller_phone) lockedEl.textContent = data.seller_phone;
      return;
    }

    const d = data.dossier;
    const setIfEmpty = (id, val) => {
      if (val === null || val === undefined || val === "") return;
      const el = document.getElementById(id);
      if (el && !el.value) el.value = String(val);
    };
    setIfEmpty("naam", d.naam);
    setIfEmpty("email", d.email);

    // Display the authenticated sign-in phone (always available from the
    // session, even before the dossier row exists). Pre-fill the alt-phone
    // input only if the seller had typed one previously.
    const signinPhone = data.seller_phone || d.phone_e164 || "";
    const locked = document.getElementById("phoneLockedValue");
    if (locked && signinPhone) locked.textContent = signinPhone;
    const altInput = document.getElementById("tel");
    const altWrap = document.getElementById("phoneAltWrap");
    if (altInput && d.telefoon && d.telefoon !== signinPhone) {
      altInput.value = d.telefoon;
      if (altWrap) altWrap.style.display = "block";
    }

    setIfEmpty("straat", d.straat);
    setIfEmpty("postcode", d.postcode);
    setIfEmpty("woonplaats", d.woonplaats);
    setIfEmpty("vraagprijs", d.vraagprijs);
    setIfEmpty("oplev_datum", d.oplev_datum);
    setIfEmpty("motivatie", d.motivatie);
    setIfEmpty("gebreken_toel", d.gebreken_toel);
    setIfEmpty("vve_sfeer", d.vve_sfeer);
    setIfEmpty("verbouw_toel", d.verbouw_toel);

    // Replace uploaded[] with server's view of "current" files.
    if (Array.isArray(data.files) && data.files.length) {
      Object.keys(uploaded).forEach(k => delete uploaded[k]);
      for (const f of data.files) {
        if (!uploaded[f.doc_key]) uploaded[f.doc_key] = [];
        uploaded[f.doc_key].push({
          name: f.filename,
          size: f.size_bytes,
          status: "uploaded",
          serverId: f.id,
          version: f.version,
          preview_url: f.preview_url,
        });
      }
      Object.keys(uploaded).forEach(rerenderFileList);
    }

    // Block D — AI-generated follow-up questions, rendered in step 4.
    if (Array.isArray(data.seller_questions) && data.seller_questions.length) {
      renderAiQuestions(data.seller_questions, data.seller_answers || {});
    }
  } catch (e) { /* offline / no cookie / endpoint down — fall through silently */ }
}

/* Block D — render AI-generated yes/no questions in step 4.
   Each question becomes a yes/no radio pair; "yes" reveals an optional
   notes textarea. Answers POST to /api/verkoop/followup-answers on change
   (debounced) so refreshing the page never loses data. */
let aiAnswers = {};
let aiSaveTimer = null;
function renderAiQuestions(questions, priorAnswers) {
  aiAnswers = { ...priorAnswers };
  const section = document.getElementById("aiQuestionsSection");
  const host = document.getElementById("qs-ai");
  if (!section || !host) return;
  host.innerHTML = "";
  const isNL = lang === "nl";

  for (const q of questions) {
    const row = document.createElement("div");
    row.className = "q-row";
    const prior = priorAnswers[q.id];
    const priorYn = prior && typeof prior === "object" ? prior.yn : prior;
    const priorNote = prior && typeof prior === "object" ? (prior.note || "") : "";

    const idEsc = escHtml(q.id);
    row.innerHTML = `
      <div class="q-head">
        <div class="q-label">${escHtml(q.question)}</div>
        <div class="yn-opts">
          <input type="radio" id="ai-${idEsc}-ja" name="ai-${idEsc}" value="ja" ${priorYn === "ja" ? "checked" : ""} />
          <label for="ai-${idEsc}-ja">${isNL ? "Ja" : "Yes"}</label>
          <input type="radio" id="ai-${idEsc}-nee" name="ai-${idEsc}" value="nee" ${priorYn === "nee" ? "checked" : ""} />
          <label for="ai-${idEsc}-nee">${isNL ? "Nee" : "No"}</label>
        </div>
      </div>
      <div class="q-followup" data-for="${idEsc}" style="display:${priorYn === "ja" && q.if_yes ? "block" : "none"};">
        ${q.if_yes ? `<div style="font-size:12px;color:var(--grey-soft);margin-bottom:4px;">${escHtml(q.if_yes)}</div>` : ""}
        <textarea class="ai-note" data-for="${idEsc}" rows="2" placeholder="${isNL ? "Toelichting (optioneel)" : "Notes (optional)"}">${escHtml(priorNote)}</textarea>
      </div>
    `;
    row.querySelectorAll(`input[name="ai-${q.id}"]`).forEach(r => {
      r.addEventListener("change", e => {
        const yn = e.target.value;
        aiAnswers[q.id] = { yn, note: aiAnswers[q.id]?.note || "" };
        const fu = row.querySelector(`.q-followup[data-for="${q.id}"]`);
        if (fu) fu.style.display = (yn === "ja" && q.if_yes) ? "block" : "none";
        scheduleAiSave();
      });
    });
    const note = row.querySelector(`textarea.ai-note[data-for="${q.id}"]`);
    if (note) note.addEventListener("input", () => {
      aiAnswers[q.id] = { yn: aiAnswers[q.id]?.yn || null, note: note.value };
      scheduleAiSave();
    });
    host.appendChild(row);
  }
  section.style.display = "block";
}

function escHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;",
  }[c]));
}

function scheduleAiSave() {
  if (DEMO) return;
  clearTimeout(aiSaveTimer);
  aiSaveTimer = setTimeout(async () => {
    try {
      await fetch("/api/verkoop/followup-answers", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ answers: aiAnswers }),
      });
    } catch { /* offline — answers stay in local state */ }
  }, 700);
}

hydrateFromServer();

/* ===== Signature canvas (BW 3:15a digital signature) =====
   Lets the seller optionally draw their signature with mouse or finger.
   The result is exported as a base64 PNG data URL on submit. The typed
   name in #sig_naam is the legally-binding part — the drawing is decoration. */
(function initSignatureCanvas() {
  const canvas = document.getElementById("sigcanvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  let drawing = false;
  let hasInk = false;

  function pos(e) {
    const r = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
    return [x * canvas.width / r.width, y * canvas.height / r.height];
  }
  function start(e) {
    drawing = true; hasInk = true;
    ctx.beginPath();
    const [x, y] = pos(e);
    ctx.moveTo(x, y);
    e.preventDefault();
  }
  function move(e) {
    if (!drawing) return;
    const [x, y] = pos(e);
    ctx.lineTo(x, y);
    ctx.strokeStyle = "#1A202C";
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.stroke();
    e.preventDefault();
  }
  function end() { drawing = false; }

  canvas.addEventListener("mousedown", start);
  canvas.addEventListener("mousemove", move);
  canvas.addEventListener("mouseup", end);
  canvas.addEventListener("mouseleave", end);
  canvas.addEventListener("touchstart", start, { passive: false });
  canvas.addEventListener("touchmove", move, { passive: false });
  canvas.addEventListener("touchend", end);

  document.getElementById("clearsig")?.addEventListener("click", () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasInk = false;
  });

  // Expose for the submit handler. Returns null when nothing was drawn so
  // we don't waste a few KB persisting a blank PNG.
  window.getSignatureImage = function () {
    return hasInk ? canvas.toDataURL("image/png") : null;
  };
})();

/* ===== OTD signing (inline in step 1) ===================================
   Lets the seller sign the Opdracht tot Dienstverlening before they move
   to step 2. Submit posts to /api/verkoop/otd/sign — that fills the PDF
   template, stores it under <dossier>/_signed/otd.pdf, and writes the
   acceptance metadata onto verkoop_dossiers (otd_signed_at etc.).

   - Hides itself and shows a "✓ signed" notice when the dossier already
     has otd_signed_at (detected by polling /api/verkoop/dossier).
   - Hijacks the step-1 "Volgende" button so the seller can't skip past
     signing. */
(function () {
  const card = document.getElementById("otdSigningCard");
  if (!card) return;
  const notice = document.getElementById("otdSignedNotice");
  const acceptEl = document.getElementById("otdAccept");
  const nameEl = document.getElementById("otdName");
  const submitBtn = document.getElementById("otdSubmit");
  const errEl = document.getElementById("otdErr");
  const canvas = document.getElementById("otdSig");
  const clearBtn = document.getElementById("otdSigClear");
  const nextBtn = document.getElementById("step1NextBtn");

  let signed = false;

  function setSignedUI(sub) {
    signed = true;
    card.style.display = "none";
    if (notice) notice.style.display = "";
    if (sub && notice) {
      const subEl = notice.querySelector("#otdSignedSub");
      if (subEl) subEl.textContent = sub;
    }
  }

  function showErr(key) {
    if (!errEl) return;
    const msg = (I18N[lang] && I18N[lang][key]) || key;
    errEl.textContent = msg;
    errEl.style.display = "block";
  }
  function clearErr() { if (errEl) errEl.style.display = "none"; }

  // ---- Hi-DPI signature canvas ----
  if (canvas) {
    const ratio = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * ratio;
    canvas.height = rect.height * ratio;
    const ctx = canvas.getContext("2d");
    if (ctx) {
      ctx.scale(ratio, ratio);
      ctx.lineWidth = 2;
      ctx.lineCap = "round";
      ctx.strokeStyle = "#1A202C";
    }
    let drawing = false;
    let last = null;
    const pt = (e) => {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    };
    canvas.addEventListener("pointerdown", (e) => {
      drawing = true;
      last = pt(e);
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener("pointermove", (e) => {
      if (!drawing || !ctx) return;
      const p = pt(e);
      ctx.beginPath();
      ctx.moveTo(last.x, last.y);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      last = p;
    });
    const endDraw = () => { drawing = false; last = null; };
    canvas.addEventListener("pointerup", endDraw);
    canvas.addEventListener("pointercancel", endDraw);
    clearBtn?.addEventListener("click", () => {
      ctx?.clearRect(0, 0, canvas.width, canvas.height);
    });
  }

  function sigDataUrl() {
    if (!canvas) return "";
    const ctx = canvas.getContext("2d");
    if (!ctx) return "";
    try {
      const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      for (let i = 3; i < data.length; i += 16) {
        if (data[i] !== 0) return canvas.toDataURL("image/png");
      }
    } catch { /* tainted canvas — skip */ }
    return "";
  }

  // ---- Submit ----
  async function submit() {
    clearErr();
    if (!acceptEl?.checked) { showErr("otd_err_accept"); return; }
    const fullName = (nameEl?.value || "").trim();
    if (fullName.length < 3) { showErr("otd_err_name"); return; }

    // Pull step-1 fields for the contract.
    const naam = (document.getElementById("naam")?.value || "").trim();
    const email = (document.getElementById("email")?.value || "").trim();
    const straat = (document.getElementById("straat")?.value || "").trim();
    const postcode = (document.getElementById("postcode")?.value || "").trim();
    const altTel = (document.getElementById("tel")?.value || "").trim();
    const lockedTel = (document.getElementById("phoneLockedValue")?.textContent || "").trim();
    if (!straat || !naam || !email) { showErr("otd_err_step1"); return; }

    const parts = naam.split(/\s+/);
    const voornaam = parts.slice(0, parts.length > 1 ? -1 : 1).join(" ");
    const achternaam = parts.length > 1 ? parts.slice(-1)[0] : "";

    submitBtn.disabled = true;
    submitBtn.textContent = "…";
    try {
      const res = await fetch("/api/verkoop/otd/sign", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({
          vk_voornaam: voornaam,
          vk_achternaam: achternaam,
          vk_straat: straat,
          vk_postcode_plaats: postcode,
          vk_email: email,
          vk_telefoon: altTel || lockedTel,
          obj_adres: straat,
          obj_postcode_plaats: postcode,
          signed_name: fullName,
          accepted: true,
          signature_png: sigDataUrl(),
        }),
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) {
        errEl.textContent = body.detail || body.error || ((I18N[lang] && I18N[lang].otd_err_network) || "Signing failed.");
        errEl.style.display = "block";
        return;
      }
      setSignedUI();
    } catch (e) {
      showErr("otd_err_network");
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = (I18N[lang] && I18N[lang].otd_submit) || "Sign";
    }
  }
  submitBtn?.addEventListener("click", submit);

  // ---- Gate the step-1 "Next" button until signed ----
  if (nextBtn) {
    nextBtn.addEventListener("click", (e) => {
      if (signed) return;
      e.stopImmediatePropagation();
      e.preventDefault();
      showErr("otd_locked_hint");
      card.scrollIntoView({ behavior: "smooth", block: "center" });
    }, true);
  }

  // ---- Already-signed detection ----
  // hydrateFromServer runs async; we kick off our own fetch so the card
  // disappears as soon as we know the dossier has otd_signed_at.
  (async function detectSigned() {
    if (typeof DEMO !== "undefined" && DEMO) return;
    try {
      const res = await fetch("/api/verkoop/dossier", { credentials: "same-origin" });
      if (!res.ok) return;
      const data = await res.json();
      if (data?.dossier?.otd_signed_at) setSignedUI();
    } catch { /* offline — leave card visible */ }
  })();
})();

/* Step 1 — toggle the alternative phone input. The primary phone is
   the seller's sign-in number (already authenticated via OTP) so we
   don't ask for it again. */
document.getElementById("phoneAltToggle")?.addEventListener("click", () => {
  const wrap = document.getElementById("phoneAltWrap");
  const btn = document.getElementById("phoneAltToggle");
  if (!wrap || !btn) return;
  const open = wrap.style.display !== "none";
  if (open) {
    wrap.style.display = "none";
    btn.classList.remove("is-open");
    const input = document.getElementById("tel");
    if (input) input.value = "";
    saveDraft();
  } else {
    wrap.style.display = "block";
    btn.classList.add("is-open");
    setTimeout(() => document.getElementById("tel")?.focus(), 50);
  }
});
</script>
