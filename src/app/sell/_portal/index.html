<!doctype html>
<!--
  ApartmentHub Sale Portal / Verkoop-portal
  Voor: https://apartmenthub.nl/verkoop  (NL)  +  /sell  (EN)

  Multi-step wizard:
    Step 1: Address + seller details      (intake)
    Step 2: Document uploads
    Step 3: AI is processing...           (transition)
    Step 4: Only the remaining questions  (post-extraction)
    Step 5: Submit

  Backend integration (see endpoints near bottom of <script>):
    POST_URL:    receives the form data from step 1 + uploaded files
    EXTRACT_URL: receives uploaded files; returns JSON with prefilled
                 fields and a list of questions still open. The frontend
                 then renders only the remaining questions.
    SUBMIT_URL:  final submit with everything.
-->
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Verkoop je appartement / Sell your apartment. ApartmentHub</title>
<meta name="description" content="Begin je verkoop in 15 minuten. Upload je stukken, wij doen de rest." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --teal: #009B8A;
    --teal-dark: #007A6D;
    --orange: #FF7D28;
    --orange-dark: #E66C1A;
    --ink: #1A202C;
    --grey: #4A5568;
    --grey-soft: #718096;
    --line: #E2E8F0;
    --bg: #F7FAFC;
    --soft: #E8F5F3;
    --soft-orange: #FFF1E6;
    --ok: #15803D;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: var(--ink);
    background: var(--bg);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--teal-dark); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .topbar {
    background: var(--teal);
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .topbar img { height: 32px; width: 32px; }
  .topbar .brand { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
  .topbar .right { margin-left: auto; display: flex; gap: 18px; align-items: center; font-size: 14px; }
  .topbar .right a { color: #fff; opacity: 0.95; }
  .lang { display: inline-flex; background: rgba(255,255,255,0.18); border-radius: 999px; padding: 2px; font-size: 12px; font-weight: 600; }
  .lang button { background: transparent; border: 0; color: #fff; padding: 4px 10px; border-radius: 999px; cursor: pointer; font: inherit; }
  .lang button.active { background: #fff; color: var(--teal-dark); }

  .hero { max-width: 980px; margin: 0 auto; padding: 40px 24px 16px; }
  .eyebrow { color: var(--orange); font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  h1 { font-size: 34px; line-height: 1.1; letter-spacing: -0.02em; margin: 0 0 14px; font-weight: 700; }
  .lead { font-size: 16px; color: var(--grey); max-width: 640px; margin: 0 0 18px; }

  .progress-bar {
    background: #fff; border: 1px solid var(--line); border-radius: 14px;
    padding: 10px 14px; display: flex; gap: 12px; align-items: center;
    font-size: 13px; color: var(--grey); margin-top: 10px;
    flex-wrap: wrap;
  }
  .progress-bar .step {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 6px;
    transition: background .12s;
  }
  .progress-bar .step.done:hover { background: var(--soft); }
  .progress-bar .step.is-locked { cursor: default; }
  .progress-bar .step.is-locked:hover { background: transparent; }
  .progress-bar .dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--bg); border: 1.5px solid var(--line);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: var(--grey-soft);
  }
  .progress-bar .step.active .dot { background: var(--teal); border-color: var(--teal); color: #fff; }
  .progress-bar .step.done .dot  { background: var(--teal-dark); border-color: var(--teal-dark); color: #fff; }
  .progress-bar .sep { flex: 1; height: 1px; background: var(--line); min-width: 12px; }
  @media (max-width: 600px) {
    .progress-bar { font-size: 12px; gap: 8px; padding: 8px 10px; }
    .progress-bar .sep { min-width: 8px; }
  }

  .trust-strip {
    display: flex; gap: 18px; flex-wrap: wrap;
    margin: 14px 0 0; font-size: 13px; color: var(--grey);
  }
  .trust-strip span { display: inline-flex; align-items: center; gap: 6px; }
  .trust-strip span::before {
    content: "✓"; color: var(--teal); font-weight: 700;
  }

  .lbl .req { color: #B42318; margin-left: 2px; font-weight: 700; }

  /* Locked sign-in phone display in step 1 */
  .phone-locked {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--soft);
    border: 1px solid rgba(0, 155, 138, 0.25);
    border-radius: 10px;
    color: var(--ink);
    font-size: 14px;
    font-weight: 500;
  }
  .phone-locked-icon {
    width: 22px; height: 22px;
    background: var(--teal); color: #fff;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    flex-shrink: 0;
  }
  .phone-locked-value {
    flex: 1;
    font-variant-numeric: tabular-nums;
    min-width: 0;
    color: var(--teal-dark);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  @media (max-width: 480px) {
    .phone-locked { flex-wrap: wrap; row-gap: 8px; }
    .phone-locked-add { width: 100%; text-align: center; }
  }
  .phone-locked-add {
    background: #fff;
    border: 1px solid var(--line);
    color: var(--teal-dark);
    padding: 5px 12px;
    border-radius: 999px;
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .phone-locked-add:hover {
    background: var(--soft);
    border-color: rgba(0, 155, 138, 0.4);
  }
  .phone-locked-add.is-open {
    background: var(--bg);
    color: var(--grey);
  }

  /* ===== Form validation ===== */
  input.invalid, textarea.invalid, select.invalid {
    border-color: #B42318 !important;
    box-shadow: 0 0 0 3px rgba(180, 35, 24, 0.12);
  }
  .field-error {
    color: #B42318;
    font-size: 12px;
    font-weight: 500;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .field-error::before { content: "⚠"; font-size: 13px; }

  .validation-banner {
    background: #FEE4E2;
    border: 1px solid #FDA29B;
    border-radius: 12px;
    padding: 14px 16px;
    margin: 14px 0;
    color: #7A271A;
    font-size: 14px;
    line-height: 1.5;
    animation: shakeIn .35s ease-out;
  }
  .validation-banner .vb-title {
    font-weight: 700;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #B42318;
  }
  .validation-banner ul {
    margin: 0;
    padding-left: 22px;
    color: #912018;
  }
  .validation-banner li { margin: 2px 0; }
  @keyframes shakeIn {
    0% { opacity: 0; transform: translateY(-6px); }
    60% { transform: translateY(2px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ===== Toast notifications ===== */
  .toast-host {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
    max-width: calc(100vw - 32px);
  }
  .toast {
    background: #fff;
    border: 1px solid var(--line);
    border-left: 4px solid var(--teal);
    box-shadow: 0 8px 24px rgba(16, 24, 40, 0.12);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    color: var(--ink);
    pointer-events: auto;
    min-width: 240px;
    max-width: 380px;
    animation: toastIn .25s ease-out;
  }
  .toast.toast-error   { border-left-color: #B42318; }
  .toast.toast-success { border-left-color: #15803D; }
  .toast.toast-warn    { border-left-color: var(--orange); }
  .toast .toast-title { font-weight: 600; margin-bottom: 2px; }
  .toast .toast-body  { color: var(--grey); font-size: 13px; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .consent {
    display: flex; gap: 12px; align-items: flex-start;
    background: rgba(255,255,255,0.06); padding: 12px 14px;
    border-radius: 10px; margin: 0 0 14px;
    font-size: 13px; color: #CBD5DD; line-height: 1.45;
  }
  .consent input { margin-top: 3px; flex-shrink: 0; width: 16px; height: 16px; accent-color: var(--orange); cursor: pointer; }
  .consent label { cursor: pointer; user-select: none; }
  .consent a { color: var(--orange); text-decoration: underline; }

  /* Signature block — lives inside the dark submit-card, so colours
     invert (light field, dark canvas border). Mirrors the OTD preview
     David shared in apartmenthub-verkoop-2026-05-18-v3. */
  .sig-block { background: #fff; color: var(--ink); padding: 16px; border-radius: 10px; margin: 0 0 14px; }
  .sig-block .sig-hint { font-size: 12px; color: var(--grey-soft); margin-top: 4px; line-height: 1.45; }
  .sig-block .sig-name-input { width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px; font: inherit; font-size: 14px; }
  .sig-block .sig-name-input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0,155,138,0.18); }
  .sig-canvas-wrap { background: #fff; border: 1.5px dashed var(--line); border-radius: 10px; padding: 12px; margin: 10px 0 0; }
  .sig-canvas-wrap canvas { display: block; width: 100%; height: 130px; border-radius: 6px; cursor: crosshair; background: linear-gradient(transparent calc(100% - 1px), #E5E7EB 0); touch-action: none; }
  .sig-actions { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: var(--grey-soft); }
  .sig-actions a { cursor: pointer; color: var(--teal-dark); text-decoration: underline; }

  .saved-pill {
    position: fixed; bottom: 16px; right: 16px;
    background: var(--ink); color: #DCFCE7;
    padding: 8px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 500;
    opacity: 0; transition: opacity .25s;
    z-index: 100;
    pointer-events: none;
  }
  .saved-pill.show { opacity: 0.94; }
  .saved-pill::before { content: "✓ "; color: #15803D; font-weight: 700; }

  main { max-width: 980px; margin: 0 auto; padding: 16px 24px 80px; }

  .step-section { display: none; animation: fadeIn .25s ease; }
  .step-section.show { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .card {
    background: #fff; border: 1px solid var(--line); border-radius: 14px;
    padding: 24px; margin: 18px 0;
  }
  .card h2 {
    font-size: 20px; margin: 0 0 4px; letter-spacing: -0.01em; color: var(--teal-dark);
  }
  .card .sub { color: var(--grey); font-size: 14px; margin: 0 0 16px; }
  .field { margin-bottom: 14px; }
  label.lbl { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  input[type="text"], input[type="email"], input[type="tel"], input[type="number"],
  textarea, select {
    width: 100%; padding: 10px 12px; border: 1px solid var(--line);
    border-radius: 10px; font: inherit; background: #fff; color: var(--ink);
    transition: border-color .12s, box-shadow .12s;
  }
  input:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(0, 155, 138, 0.18);
  }
  textarea { min-height: 90px; resize: vertical; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 600px) { .row-2 { grid-template-columns: 1fr; } }

  .docs { display: grid; gap: 14px; }
  .doc { border: 1px solid var(--line); border-radius: 12px; background: #fff; overflow: hidden; }
  .doc-head {
    padding: 16px 18px; display: grid; grid-template-columns: 1fr auto;
    gap: 12px; align-items: start;
  }
  .doc-name { font-weight: 600; font-size: 15px; margin: 0 0 3px; }
  .doc-desc { font-size: 13px; color: var(--grey); margin: 0; }
  .doc-tag {
    font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 999px;
    background: var(--soft); color: var(--teal-dark);
    text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap;
  }
  .doc-tag.required    { background: #FEE4E2; color: #B42318; }
  .doc-tag.important   { background: var(--soft); color: var(--teal-dark); }
  .doc-tag.conditional { background: #F2F4F7; color: var(--grey); }

  .group-title.group-required    { color: #B42318; }
  .group-title.group-important   { color: var(--teal-dark); }
  .group-title.group-conditional { color: var(--grey); }

  .doc-skip {
    border-top: 1px dashed var(--line);
    padding: 10px 18px;
    background: var(--bg);
    font-size: 13px;
    color: var(--grey);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .doc-skip input { width: 16px; height: 16px; accent-color: var(--teal); cursor: pointer; }
  .doc-skip label { cursor: pointer; user-select: none; }
  .doc.is-skipped .drop, .doc.is-skipped .filelist { display: none; }
  .doc.is-skipped { opacity: 0.7; }

  .where { border-top: 1px dashed var(--line); background: var(--bg); padding: 0; }
  .where summary {
    list-style: none; cursor: pointer; padding: 10px 18px;
    color: var(--teal-dark); font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 6px; user-select: none;
  }
  .where summary::-webkit-details-marker { display: none; }
  .where summary::before {
    content: "?"; width: 16px; height: 16px; border-radius: 50%;
    background: var(--teal); color: #fff; font-size: 11px;
    line-height: 16px; text-align: center; font-weight: 700;
  }
  .where[open] summary::before { content: "−"; }
  .where-body { padding: 4px 18px 16px 40px; font-size: 13.5px; color: var(--grey); }
  .where-body p { margin: 0 0 6px; }
  .where-body a {
    display: inline-block; margin-top: 4px; padding: 6px 12px;
    background: var(--teal); color: #fff; border-radius: 8px;
    font-weight: 600; font-size: 13px;
  }
  .where-body a:hover { background: var(--teal-dark); text-decoration: none; }

  .drop {
    border: 2px dashed var(--teal);
    border-radius: 10px;
    padding: 22px 18px;
    margin: 14px 18px 18px;
    background: var(--soft);
    text-align: center;
    cursor: pointer;
    transition: border-color .12s, background .12s, transform .08s;
    display: block;
  }
  .drop:hover { background: #DCEFEC; transform: translateY(-1px); }
  .drop.drag { border-color: var(--orange); background: var(--soft-orange); border-style: solid; }
  .drop .drop-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px; height: 38px;
    background: var(--teal);
    color: #fff;
    border-radius: 50%;
    margin-bottom: 8px;
    font-size: 20px;
    font-weight: 700;
  }
  .drop p { margin: 0; color: var(--ink); font-size: 14px; }
  .drop strong { color: var(--teal-dark); font-weight: 600; }
  .drop .drop-sub { color: var(--grey); font-size: 12px; margin-top: 3px; }
  .drop input[type=file] { display: none; }

  .filelist { padding: 0 18px 18px; display: grid; gap: 6px; }
  .filelist:empty { display: none; }
  .file-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 12px;
    background: var(--soft); border-radius: 8px; font-size: 13px;
  }
  .file-item .name { flex: 1; color: var(--ink); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .size { color: var(--grey); font-size: 12px; }
  .file-item button { background: none; border: 0; color: var(--grey); cursor: pointer; padding: 2px 6px; font-size: 16px; line-height: 1; }
  .file-item button:hover { color: var(--orange-dark); }
  .file-item .status-tag {
    font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap;
  }
  .file-item.status-uploading .status-tag { background: var(--soft-orange); color: var(--orange-dark); }
  .file-item.status-uploaded .status-tag  { background: var(--soft);        color: var(--teal-dark); }
  .file-item.status-failed .status-tag    { background: #FEE4E2;            color: #B42318; }
  .file-item.status-uploading { opacity: 0.85; }
  .file-item.status-failed { background: #FFF5F4; }
  .file-item .file-link {
    color: var(--teal-dark); text-decoration: none; font-size: 12px; font-weight: 500;
  }
  .file-item .file-link:hover { text-decoration: underline; }

  .btn {
    background: var(--teal); color: #fff; border: 0; padding: 12px 22px;
    border-radius: 10px; font: inherit; font-weight: 600; cursor: pointer;
    transition: background .12s;
  }
  .btn:hover { background: var(--teal-dark); }
  .btn:disabled { background: var(--grey-soft); cursor: not-allowed; }
  .btn.ghost { background: transparent; color: var(--grey); border: 1px solid var(--line); }
  .btn.ghost:hover { background: var(--bg); color: var(--ink); }
  .btn.orange { background: var(--orange); }
  .btn.orange:hover { background: var(--orange-dark); }

  .nav-row {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    margin-top: 24px; justify-content: space-between;
  }
  .nav-row .left { display: flex; gap: 12px; }
  .nav-row .small { color: var(--grey-soft); font-size: 13px; }

  .q-row {
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 10px;
    background: #fff;
  }
  .q-row .q-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px;
  }
  .q-row .q-label { font-size: 14px; }
  .q-row.q-prefilled {
    background: linear-gradient(0deg, #fff 0%, #fff 100%), var(--soft);
    border-color: #BDE5DE;
    background: var(--soft);
  }
  .q-row.q-prefilled .q-label::after {
    content: "AI";
    margin-left: 8px;
    font-size: 10px;
    background: var(--teal);
    color: #fff;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 0.04em;
    vertical-align: middle;
  }
  .yn-opts { display: flex; gap: 6px; flex-shrink: 0; }
  .yn-opts label {
    padding: 5px 12px; border: 1px solid var(--line); border-radius: 6px;
    font-size: 13px; cursor: pointer; color: var(--grey); user-select: none;
  }
  .yn-opts input { display: none; }
  .yn-opts input:checked + label {
    background: var(--teal); color: #fff; border-color: var(--teal);
  }
  .q-followup, .q-amount, .q-open {
    margin-top: 10px;
  }
  .q-followup textarea, .q-open textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--line);
    border-radius: 8px; font: inherit; font-size: 13px;
    min-height: 60px; resize: vertical;
  }
  .q-amount input {
    padding: 8px 12px; border: 1px solid var(--line);
    border-radius: 8px; font: inherit; font-size: 13px;
    width: 180px;
  }
  .q-amount label, .q-followup label, .q-open label {
    display: block; font-size: 12px; color: var(--grey-soft);
    margin-bottom: 4px;
  }
  .q-radio { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .q-radio label {
    padding: 8px 14px; border: 1px solid var(--line); border-radius: 8px;
    font-size: 13px; cursor: pointer; color: var(--grey); user-select: none;
  }
  .q-radio input { display: none; }
  .q-radio input:checked + label {
    background: var(--teal); color: #fff; border-color: var(--teal);
  }
  .q-multi { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .q-multi label {
    padding: 8px 14px; border: 1px solid var(--line); border-radius: 8px;
    font-size: 13px; cursor: pointer; color: var(--grey); user-select: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .q-multi label::before {
    content: ""; width: 14px; height: 14px;
    border: 1.5px solid var(--line); border-radius: 3px; display: inline-block;
  }
  .q-multi input { display: none; }
  .q-multi input:checked + label {
    background: var(--soft); color: var(--teal-dark); border-color: var(--teal);
  }
  .q-multi input:checked + label::before {
    background: var(--teal); border-color: var(--teal);
    box-shadow: inset 0 0 0 2px var(--teal), inset 0 0 0 4px #fff;
  }

  .banner {
    background: var(--soft); border-left: 4px solid var(--teal);
    padding: 14px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px;
  }
  .banner.private {
    background: var(--soft-orange); border-left-color: var(--orange);
  }
  .banner b { color: var(--teal-dark); }
  .banner.private b { color: var(--orange-dark); }
  .we-handle-list {
    margin: 8px 0 0 18px; padding: 0; font-size: 13.5px; line-height: 1.55;
    color: var(--grey);
  }
  .we-handle-list li { margin: 2px 0; }
  .we-handle-list li::marker { color: var(--teal); }

  .group-title {
    margin: 26px 4px 10px; font-size: 14px; color: var(--grey-soft);
    text-transform: uppercase; letter-spacing: .06em; font-weight: 600;
  }
  .qg-title {
    margin-top: 22px; font-size: 14px; color: var(--ink); font-weight: 600;
  }

  .submit-card {
    background: var(--ink); color: #fff; border-radius: 14px; padding: 28px; margin: 28px 0;
  }
  .submit-card h2 { color: #fff; margin: 0 0 8px; font-size: 22px; }
  .submit-card p { color: #CBD5DD; margin: 0 0 16px; }
  .submit-card .btn { background: var(--orange); }
  .submit-card .btn:hover { background: var(--orange-dark); }
  .submit-card .small { color: #9CA3AF; font-size: 13px; }

  /* loader */
  .loader-card {
    background: #fff; border: 1px solid var(--line); border-radius: 14px;
    padding: 56px 28px; text-align: center;
  }
  .loader {
    width: 60px; height: 60px; margin: 0 auto 18px;
    border-radius: 50%;
    border: 4px solid var(--soft);
    border-top-color: var(--teal);
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-card h3 { font-size: 20px; margin: 0 0 6px; color: var(--teal-dark); }
  .loader-card p { color: var(--grey); margin: 0 0 20px; font-size: 14px; }
  .loader-list {
    max-width: 460px; margin: 0 auto; text-align: left;
    background: var(--bg); border-radius: 10px; padding: 14px 18px;
    font-size: 13.5px;
  }
  .loader-list .item {
    display: flex; align-items: center; gap: 8px; padding: 4px 0;
    color: var(--grey);
  }
  .loader-list .item.done { color: var(--ok); font-weight: 500; }
  .loader-list .item .ico { width: 14px; flex-shrink: 0; text-align: center; }

  /* prefilled badge for questions where AI extracted the answer */
  .prefilled-banner {
    background: var(--soft); border: 1px solid #BDE5DE; border-radius: 10px;
    padding: 14px 16px; margin-bottom: 16px; font-size: 13.5px; color: var(--ink);
  }
  .prefilled-banner b { color: var(--teal-dark); }
  .prefilled-banner ul { margin: 6px 0 0; padding-left: 20px; }
  .prefilled-banner li { margin-bottom: 2px; }

  /* price estimate */
  .price-estimate {
    background: var(--soft);
    border: 1px solid #BDE5DE;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 18px;
  }
  .pe-head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .pe-icon {
    width: 38px; height: 38px; flex-shrink: 0;
    border-radius: 50%; background: var(--teal); color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 700;
  }
  .pe-title { font-weight: 700; color: var(--teal-dark); font-size: 14px; }
  .pe-body { color: var(--grey); font-size: 13px; margin-top: 2px; }
  .pe-range { margin: 8px 0 14px; }
  .pe-bar { height: 6px; background: #fff; border: 1px solid #BDE5DE; border-radius: 3px; overflow: hidden; position: relative; }
  .pe-bar-fill { position: absolute; top: 0; left: 18%; right: 18%; bottom: 0; background: var(--teal); }
  .pe-numbers {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--grey); margin-top: 6px;
  }
  .pe-numbers #peMid { font-weight: 700; color: var(--teal-dark); font-size: 14px; }
  .pe-basis { color: var(--grey-soft); font-size: 12px; margin-bottom: 12px; }
  .pe-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-sm { padding: 8px 14px; font-size: 13px; }
</style>
</head>

<script>
  function logout() {
    // The /api/auth/signout POST clears the verkoop_sessions row + ah_sess
    // cookie and replies with a 303 redirect to /sell. From there the route
    // handler sees no cookie and redirects to /sell/login. Using fetch then
    // window.location instead of a form post so we stay on the same tab
    // without a flash of the browser's POST-redirect intermediate page.
    fetch("/api/auth/signout", { method: "POST", credentials: "same-origin" })
      .catch(() => { /* even on network error, force the user to the login */ })
      .finally(() => { window.location.href = "/sell"; });
  }
</script>

<main>

<!-- ========== STEP 1: address + seller ========== -->
<section class="step-section show" data-step="1">
  <div class="card">
    <h2 data-i18n="step1_title"></h2>
    <p class="sub" data-i18n="step1_sub"></p>
    <div class="row-2">
      <div class="field">
        <label class="lbl" for="straat"><span data-i18n="lbl_street"></span><span class="req">*</span></label>
        <input id="straat" type="text" autocomplete="street-address" data-placeholder="ph_street" required />
      </div>
      <div class="field">
        <label class="lbl" for="postcode"><span data-i18n="lbl_postcode"></span><span class="req">*</span></label>
        <input id="postcode" type="text" data-placeholder="ph_postcode" required />
      </div>
    </div>
    <div class="row-2">
      <div class="field">
        <label class="lbl" for="naam"><span data-i18n="lbl_name"></span><span class="req">*</span></label>
        <input id="naam" type="text" autocomplete="name" required />
      </div>
      <div class="field">
        <label class="lbl" for="email"><span data-i18n="lbl_email"></span><span class="req">*</span></label>
        <input id="email" type="email" autocomplete="email" required />
      </div>
    </div>
    <div class="row-2">
      <div class="field" id="phoneAuthField">
        <label class="lbl"><span data-i18n="lbl_phone_signin"></span></label>
        <div class="phone-locked" id="phoneLocked">
          <span class="phone-locked-icon" aria-hidden>✓</span>
          <span class="phone-locked-value" id="phoneLockedValue"></span>
          <button type="button" class="phone-locked-add" id="phoneAltToggle">
            <span data-i18n="phone_alt_toggle"></span>
          </button>
        </div>
        <!-- Hidden until the seller clicks "Add alternative phone" -->
        <div id="phoneAltWrap" style="display:none; margin-top:10px;">
          <label class="lbl" for="tel" style="font-size:12px;">
            <span data-i18n="lbl_phone_alt"></span>
          </label>
          <input id="tel" type="tel" autocomplete="tel" data-placeholder="ph_phone" />
        </div>
      </div>
      <div class="field">
        <label class="lbl" for="moment" data-i18n="lbl_moment"></label>
        <select id="moment">
          <option value="" data-i18n="opt_no_pref"></option>
          <option data-i18n="opt_morning"></option>
          <option data-i18n="opt_afternoon"></option>
          <option data-i18n="opt_evening"></option>
        </select>
      </div>
    </div>
  </div>

  <div class="banner">
    <b data-i18n="banner_public_title"></b><br />
    <span data-i18n="banner_public_body"></span>
  </div>

  <!-- ===== OTD signing — appended inside step 1 =====
       The seller signs the Opdracht tot Dienstverlening before they can
       move to step 2. Submit posts to /api/verkoop/otd/sign which fills
       the PDF template and stores it at <dossier>/_signed/otd.pdf. -->
  <div class="card" id="otdSigningCard">

let enrichmentResult = null;             // { validatedAddress, bouwjaar, energielabel, ... }
let leadId = null;                       // returned by /api/verkoop/intake; ties leads -> dossiers
const MAX_FILE_BYTES = 32 * 1024 * 1024; // Claude API limit per PDF
const STATE_KEY = "ah_verkoop_draft_v1"; // sessionStorage

function t() { return I18N[lang]; }

/* ===== rendering helpers ===== */
function applyStaticI18n() {
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    // submit button bewaart succes-tekst over taalwissel heen
    if (el.id === "submitBtn" && el.dataset.done === "1") {
      el.textContent = "✓ " + t().submit_done;
      return;
    }
    const key = el.getAttribute("data-i18n");
    const v = t()[key];
    if (typeof v === "string") el.textContent = v;
  });
  document.querySelectorAll("[data-placeholder]").forEach(el => {
    const key = el.getAttribute("data-placeholder");
    const v = t()[key];
    if (typeof v === "string") el.setAttribute("placeholder", v);
  });
  document.querySelectorAll(".lang button").forEach(b => {
    b.classList.toggle("active", b.getAttribute("data-lang") === lang);
  });
}

function clearGroups() {
  Object.keys(DOC_GROUPS).forEach(g => {
    const el = document.getElementById(g);
    if (el) el.innerHTML = "";
  });
  Q_GROUPS.forEach(g => {
    const el = document.getElementById(g);
    if (el) el.innerHTML = "";
  });
}

function renderDocCard(group, doc) {
  const tr = t().docs[doc.key];
  const wrap = document.createElement("div");
  wrap.className = "doc";
  wrap.dataset.key = doc.key;
  if (skippedDocs.has(doc.key)) wrap.classList.add("is-skipped");

  // tag label by level
  const tagText = t()["tag_" + doc.level] || tr.tag;
  const head = document.createElement("div");
  head.className = "doc-head";
  head.innerHTML = `
    <div>
      <p class="doc-name"></p>
      <p class="doc-desc"></p>
    </div>
    <span class="doc-tag ${doc.level}"></span>
  `;
  head.querySelector(".doc-name").textContent = tr.naam;
  head.querySelector(".doc-desc").textContent = tr.desc;
  head.querySelector(".doc-tag").textContent = tagText;
  wrap.appendChild(head);

  if (tr.where) {
    const det = document.createElement("details");
    det.className = "where";
    const sum = document.createElement("summary");
    sum.textContent = t().where_label;
    det.appendChild(sum);
    const body = document.createElement("div");
    body.className = "where-body";
    const p = document.createElement("p");
    p.textContent = tr.where;
    body.appendChild(p);
    if (doc.link) {
      const a = document.createElement("a");
      a.href = doc.link;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.textContent = (tr.linkLabel || t().open) + " ↗";
      body.appendChild(a);
    }
    det.appendChild(body);
    wrap.appendChild(det);
  }

  // skip toggle voor optionele documenten (bv. "ik heb geen hypotheek")
  if (doc.skippable && tr.skipLabel) {
    const skipRow = document.createElement("div");
    skipRow.className = "doc-skip";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.id = "skip_" + doc.key;
    cb.checked = skippedDocs.has(doc.key);
    cb.addEventListener("change", () => {
      if (cb.checked) {
        skippedDocs.add(doc.key);
        delete uploaded[doc.key];
      } else {
        skippedDocs.delete(doc.key);
      }
      wrap.classList.toggle("is-skipped", cb.checked);
      rerenderFileList(doc.key);
    });
    const lab = document.createElement("label");
    lab.htmlFor = "skip_" + doc.key;
    lab.textContent = tr.skipLabel;
    skipRow.appendChild(cb);
    skipRow.appendChild(lab);
    wrap.appendChild(skipRow);
  }

  const drop = document.createElement("label");
  drop.className = "drop";
  const input = document.createElement("input");
  input.type = "file";
  input.multiple = true;
  input.accept = ".pdf,.jpg,.jpeg,.png,.heic,.doc,.docx,.xls,.xlsx";
  input.dataset.doc = doc.key;
  drop.appendChild(input);
  const icon = document.createElement("span");
  icon.className = "drop-icon";
  icon.textContent = "+";
  drop.appendChild(icon);
  const p1 = document.createElement("p");
  const strong = document.createElement("strong");
  strong.textContent = t().drop_strong;
  p1.appendChild(strong);
  drop.appendChild(p1);
  const p2 = document.createElement("p");
  p2.className = "drop-sub";
  p2.textContent = t().drop_sub;
  drop.appendChild(p2);
  wrap.appendChild(drop);

  const list = document.createElement("div");
  list.className = "filelist";
  list.dataset.for = doc.key;
  wrap.appendChild(list);

  document.getElementById(group).appendChild(wrap);

  input.addEventListener("change", e => handleFiles(doc.key, e.target.files));
  ["dragenter", "dragover"].forEach(ev =>
    drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("drag"); })
  );
  ["dragleave", "drop"].forEach(ev =>
    drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("drag"); })
  );
  drop.addEventListener("drop", e => {
    if (e.dataTransfer && e.dataTransfer.files) handleFiles(doc.key, e.dataTransfer.files);
  });
}

function renderQuestions(groupId) {
  const wrap = document.getElementById(groupId);
  const skip = (extractionResult && extractionResult.skipQuestions) || [];
  const prefill = (extractionResult && extractionResult.prefilled) || {};
  t().questions[groupId].forEach(q => {
    if (skip.includes(q.id)) return;
    const row = renderQuestion(q, prefill[q.id]);
    wrap.appendChild(row);
  });
}

function renderQuestion(q, pre) {
  const row = document.createElement("div");
  row.className = "q-row";
  if (pre !== undefined && pre !== null && pre !== "") row.classList.add("q-prefilled");

  const head = document.createElement("div");
  head.className = "q-head";
  const labelEl = document.createElement("span");
  labelEl.className = "q-label";
  labelEl.textContent = q.label;
  head.appendChild(labelEl);

  if (q.type === "yn" || q.type === "yn_followup_no" || q.type === "yn_amount_yes") {
    head.appendChild(buildYnButtons(q.id, pre));
  }
  row.appendChild(head);

  if (q.type === "yn_followup_no") {
    const followup = document.createElement("div");
    followup.className = "q-followup";
    followup.style.display = pre === "nee" ? "block" : "none";
    const lbl = document.createElement("label");
    lbl.htmlFor = q.id + "_fu";
    lbl.textContent = t()[q.followupKey] || t().followup_no;
    followup.appendChild(lbl);
    const ta = document.createElement("textarea");
    ta.id = q.id + "_fu";
    ta.placeholder = t().open_placeholder;
    followup.appendChild(ta);
    row.appendChild(followup);
    row.querySelector(`input[name="${q.id}"][value="nee"]`).addEventListener("change", e => {
      followup.style.display = e.target.checked ? "block" : "none";
    });
    row.querySelector(`input[name="${q.id}"][value="ja"]`).addEventListener("change", () => {
      followup.style.display = "none";
    });
  }

  if (q.type === "yn_amount_yes") {
    const amount = document.createElement("div");
    amount.className = "q-amount";
    amount.style.display = pre === "ja" ? "block" : "none";
    const lbl = document.createElement("label");
    lbl.htmlFor = q.id + "_amt";
    lbl.textContent = t().yn_amount_hint;
    amount.appendChild(lbl);
    const inp = document.createElement("input");
    inp.id = q.id + "_amt";
    inp.type = "text";
    inp.inputMode = "decimal";
    inp.placeholder = "€";
    amount.appendChild(inp);
    row.appendChild(amount);
    row.querySelector(`input[name="${q.id}"][value="ja"]`).addEventListener("change", e => {
      amount.style.display = e.target.checked ? "block" : "none";
    });
    row.querySelector(`input[name="${q.id}"][value="nee"]`).addEventListener("change", () => {
      amount.style.display = "none";
    });
  }

  if (q.type === "open") {
    const open = document.createElement("div");
    open.className = "q-open";
    const ta = document.createElement("textarea");
    ta.id = q.id;
    ta.name = q.id;
    ta.placeholder = t().open_placeholder;
    if (typeof pre === "string") ta.value = pre;
    open.appendChild(ta);
    row.appendChild(open);
  }

  if (q.type === "radio") {
    const opts = (t()[q.optionsKey] || []);
    const radio = document.createElement("div");
    radio.className = "q-radio";
    opts.forEach((opt, i) => {
      const id = `${q.id}_${i}`;
      const inp = document.createElement("input");
      inp.type = "radio";
      inp.name = q.id;
      inp.id = id;
      inp.value = opt;
      if (pre === opt) inp.checked = true;
      const lbl = document.createElement("label");
      lbl.htmlFor = id;
      lbl.textContent = opt;
      radio.appendChild(inp);
      radio.appendChild(lbl);
    });
    row.appendChild(radio);
  }

  if (q.type === "multiselect") {
    const opts = (t()[q.optionsKey] || []);
    const multi = document.createElement("div");
    multi.className = "q-multi";
    const preArr = Array.isArray(pre) ? pre : [];
    opts.forEach((opt, i) => {
      const id = `${q.id}_${i}`;
      const inp = document.createElement("input");
      inp.type = "checkbox";
      inp.name = q.id;
      inp.id = id;
      inp.value = opt;
      if (preArr.includes(opt)) inp.checked = true;
      const lbl = document.createElement("label");
      lbl.htmlFor = id;
      lbl.textContent = opt;
      multi.appendChild(inp);
      multi.appendChild(lbl);
    });
    row.appendChild(multi);
  }

  return row;
}

function buildYnButtons(id, pre) {
  const span = document.createElement("span");
  span.className = "yn-opts";
  span.innerHTML = `
    <input type="radio" name="${id}" id="${id}_ja" value="ja" />
    <label for="${id}_ja">${t().yn_yes}</label>
    <input type="radio" name="${id}" id="${id}_nee" value="nee" />
    <label for="${id}_nee">${t().yn_no}</label>
  `;
  if (pre === "ja" || pre === true) span.querySelector(`#${id}_ja`).checked = true;
  if (pre === "nee" || pre === false) span.querySelector(`#${id}_nee`).checked = true;
  return span;
}

function rerenderAll() {
  clearGroups();
  applyStaticI18n();
  Object.keys(DOC_GROUPS).forEach(g => DOC_GROUPS[g].forEach(d => renderDocCard(g, d)));
  Q_GROUPS.forEach(renderQuestions);
  Object.keys(uploaded).forEach(rerenderFileList);
  renderEnrichmentBanner();
  renderPrefilledBanner();
  renderPriceEstimate();
  renderConsentLabel();
  const sb = document.getElementById("submitBtn");
  // bewaar succes-state ook na taalwissel
  if (sb && !sb.disabled && !sb.dataset.done) sb.textContent = t().submit_btn;
}

function renderPriceEstimate() {
  const box = document.getElementById("priceEstimateBox");
  if (!box) return;
  const est = extractionResult && extractionResult.priceEstimate;
  if (!est) {
    box.style.display = "none";
    return;
  }
  box.style.display = "block";
  const fmt = n => "€ " + n.toLocaleString(lang === "nl" ? "nl-NL" : "en-US");
  document.getElementById("peLow").textContent  = fmt(est.low);
  document.getElementById("peMid").textContent  = fmt(est.mid);
  document.getElementById("peHigh").textContent = fmt(est.high);
  document.getElementById("peBasis").textContent = est.basis || "";
  // wire buttons (idempotent)
  document.getElementById("peUseBtn").onclick = () => {
    document.getElementById("vraagprijs").value = est.mid.toLocaleString(lang === "nl" ? "nl-NL" : "en-US");
    box.style.display = "none";
    document.getElementById("vraagprijs").focus();
  };
  document.getElementById("peOtherBtn").onclick = () => {
    box.style.display = "none";
    document.getElementById("vraagprijs").focus();
  };
}

function renderPrefilledBanner() {
  const banner = document.getElementById("prefilledBanner");
  const list = document.getElementById("prefilledList");
  if (!extractionResult || !extractionResult.summary || extractionResult.summary.length === 0) {
    banner.style.display = "none";
    return;
  }
  banner.style.display = "block";
  list.innerHTML = "";
  extractionResult.summary.forEach(line => {
    const li = document.createElement("li");
    li.textContent = line;
    list.appendChild(li);
  });
}

/**
 * Render the public register enrichment banner so the seller sees what
 * was actually fetched (vs. what we promised). Pulls the data fresh
 * from `enrichmentResult` and localizes in the current language.
 * If nothing was found we show a single "Geen data gevonden" line so
 * the seller knows we tried. Failure shouldn't be invisible.
 */
function renderEnrichmentBanner() {
  const banner = document.getElementById("enrichmentBanner");
  const list = document.getElementById("enrichmentList");
  if (!banner || !list) return;
  const isNL = lang === "nl";
  const lines = [];
  const e = enrichmentResult || {};
  const va = e.validatedAddress;
  if (va) {
    lines.push(isNL
      ? `Adres bevestigd: ${va.straat} ${va.huisnummer}, ${va.postcode} ${va.woonplaats}`
      : `Address confirmed: ${va.straat} ${va.huisnummer}, ${va.postcode} ${va.woonplaats}`);
    if (va.buurt) {
      lines.push(isNL
        ? `Buurt: ${va.buurt}${va.wijk ? `, wijk ${va.wijk}` : ""}`
        : `Neighbourhood: ${va.buurt}${va.wijk ? `, district ${va.wijk}` : ""}`);
    }
  }
  if (e.bouwjaar) lines.push(isNL ? `Bouwjaar: ${e.bouwjaar}` : `Year built: ${e.bouwjaar}`);
  if (e.oppervlakte) lines.push(isNL
    ? `Oppervlakte (BAG): ${e.oppervlakte} m²`
    : `Floor area (BAG): ${e.oppervlakte} m²`);
  if (e.energielabel && e.energielabel.klasse) lines.push(isNL
    ? `Definitief energielabel: ${e.energielabel.klasse}`
    : `Definitive energy label: ${e.energielabel.klasse}`);
  if (e.monument) lines.push(isNL
    ? `Status: ${e.monument.type === "rijksmonument" ? "Rijksmonument" : "Gemeentelijk monument"}${e.monument.nummer ? " " + e.monument.nummer : ""}`
    : `Status: ${e.monument.type === "rijksmonument" ? "National monument" : "Municipal monument"}${e.monument.nummer ? " " + e.monument.nummer : ""}`);

  // Hide the banner entirely until intake has run (otherwise the very
  // first render of step 4 in DEMO mode would already show "geen data").
  if (!enrichmentResult) {
    banner.style.display = "none";
    return;
  }
  banner.style.display = "block";
  list.innerHTML = "";
  if (lines.length === 0) {
    const li = document.createElement("li");
    li.textContent = t().enrichment_none;
    list.appendChild(li);
    return;
  }
  lines.forEach(line => {
    const li = document.createElement("li");
    li.textContent = line;
    list.appendChild(li);
  });
}

// Block B incremental save:
//   In live mode (non-DEMO), each file is uploaded to /api/verkoop/upload the
//   moment the seller picks it. The local `uploaded[docKey]` array stores UI
//   items that mix transient File objects (uploading/failed) with server-known
//   records (uploaded). Each item has a `status` so the row can show progress
//   and let the user retry / replace / remove.
//
//   In DEMO mode (file:// or ?demo=1) we keep the original behavior — local
//   File objects only — so the existing demo walkthrough still works offline.
function handleFiles(docKey, fileList) {
  if (!uploaded[docKey]) uploaded[docKey] = [];
  const tooBig = [];
  const accepted = [];
  for (const f of fileList) {
    if (f.size > MAX_FILE_BYTES) { tooBig.push(f.name); continue; }
    accepted.push(f);
  }
  if (tooBig.length) {
    alert(t().err_file_too_big + "\n" + tooBig.join("\n"));
  }
  for (const f of accepted) {
    if (DEMO) {
      uploaded[docKey].push({ file: f, name: f.name, size: f.size, status: "uploaded" });
    } else {
      const item = { file: f, name: f.name, size: f.size, status: "uploading" };
      uploaded[docKey].push(item);
      rerenderFileList(docKey);
      uploadOne(docKey, item);
    }
  }
  rerenderFileList(docKey);
  saveDraft();
}

async function uploadOne(docKey, item) {
  try {
    const fd = new FormData();
    fd.append("doc_key", docKey);
    fd.append("file", item.file);
    const res = await fetch(UPLOAD_URL, { method: "POST", body: fd, credentials: "same-origin" });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      item.status = "failed";
      item.error = body.error || `http_${res.status}`;
      rerenderFileList(docKey);
      return;
    }
    const data = await res.json();
    item.status = "uploaded";
    item.file = null;
    item.serverId = data.id;
    item.version = data.version;
    item.preview_url = data.preview_url;
    item.name = data.filename;
    item.size = data.size_bytes;
    rerenderFileList(docKey);
    // Per-doc AI pre-extract runs server-side inside /api/verkoop/upload
    // via waitUntil — no client trigger needed. Browser keepalive was
    // unreliable: ~67% of files ended with ai_extract_status=null because
    // the request never reached the server.
  } catch (err) {
    item.status = "failed";
    item.error = (err && err.message) || "network";
    rerenderFileList(docKey);
  }
}

async function deleteOne(docKey) {
  try {
    const res = await fetch(`${UPLOAD_URL}?doc_key=${encodeURIComponent(docKey)}`, {
      method: "DELETE",
      credentials: "same-origin",
    });
    return res.ok;
  } catch { return false; }
}

function rerenderFileList(docKey) {
  const list = document.querySelector(`.filelist[data-for="${docKey}"]`);
  if (!list) return;
  list.innerHTML = "";
  (uploaded[docKey] || []).forEach((f, idx) => {
    const item = document.createElement("div");
    item.className = "file-item";
    if (f.status) item.classList.add(`status-${f.status}`);
    item.innerHTML = `
      <span class="name"></span>
      <span class="size"></span>
      <span class="status-tag"></span>
      <button type="button" title="Remove">×</button>
    `;
    item.querySelector(".name").textContent = f.name;
    item.querySelector(".size").textContent = formatSize(f.size);
    const tag = item.querySelector(".status-tag");
    if (f.status === "uploading") tag.textContent = (lang === "en" ? "uploading…" : "uploaden…");
    else if (f.status === "failed") tag.textContent = (lang === "en" ? "failed — retry" : "mislukt — opnieuw");
    else if (f.status === "uploaded" && f.version > 1) tag.textContent = `v${f.version}`;
    else tag.textContent = "";

    if (f.preview_url) {
      const link = document.createElement("a");
      link.href = f.preview_url;
      link.target = "_blank";
      link.rel = "noreferrer";
      link.className = "file-link";
      link.textContent = (lang === "en" ? "open" : "open");
      item.insertBefore(link, item.querySelector("button"));
    }

    item.querySelector("button").addEventListener("click", async () => {
      const wasServer = !!f.serverId;
      uploaded[docKey].splice(idx, 1);
      rerenderFileList(docKey);
      // If this was the last current file for the doc_key on the server,
      // soft-delete it. Idempotent server-side.
      if (!DEMO && wasServer && !(uploaded[docKey] || []).some(x => x.serverId)) {
        await deleteOne(docKey);
      }
      saveDraft();
    });
    list.appendChild(item);
  });
}

function formatSize(n) {
  if (n < 1024) return n + " B";
  if (n < 1024 * 1024) return (n / 1024).toFixed(0) + " KB";
  return (n / 1024 / 1024).toFixed(1) + " MB";
}

/* ===== step navigation ===== */
function showStep(n) {
  currentStep = n;
  document.querySelectorAll(".step-section").forEach(s => {
    s.classList.toggle("show", parseInt(s.dataset.step, 10) === n);
  });
  document.querySelectorAll(".progress-bar .step").forEach(el => {
    const sn = parseInt(el.dataset.stepnum, 10);
    el.classList.remove("active", "done", "is-locked");
    if (sn < n) el.classList.add("done");
    else if (sn === n) el.classList.add("active");
    else el.classList.add("is-locked");
  });
  window.scrollTo({ top: 0, behavior: "smooth" });
  // focus eerste invoer in nieuwe stap (alleen op desktop, op mobile verstoort dit
  // de viewport door keyboard pop-up)
  if (window.innerWidth > 720) {
    setTimeout(() => {
      const sec = document.querySelector(`.step-section[data-step="${n}"]`);
      const f = sec && sec.querySelector("input:not([type='hidden']):not([type='file']):not([disabled]), textarea, select");
      if (f) f.focus({ preventScroll: true });
    }, 250);
  }
  saveDraft();
}

// klikbare stap-indicators (alleen terug naar gedaane stappen)
document.querySelectorAll(".progress-bar .step").forEach(el => {
  el.addEventListener("click", () => {
    const target = parseInt(el.dataset.stepnum, 10);
    if (target < currentStep) showStep(target);
  });
});

function validateStep1() {
  const required = ["straat", "postcode", "naam", "email"];
  let firstBad = null;
  for (const id of required) {
    const el = document.getElementById(id);
    if (!el.value.trim()) { firstBad = el; break; }
  }
  if (firstBad) {
    alert(t().err_step1);
    firstBad.focus();
    firstBad.scrollIntoView({ block: "center", behavior: "smooth" });
    return false;
  }
  // email format
  const email = document.getElementById("email").value.trim();
  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
  if (!emailOk) {
    alert(t().err_email);
    document.getElementById("email").focus();
    return false;
  }
  // postcode format (NL: 1234 AB)
  const pc = document.getElementById("postcode").value.trim();
  const pcMatch = pc.replace(/\s+/g, " ").match(/^(\d{4})\s?([a-zA-Z]{2})\b/);
  if (!pcMatch) {
    alert(t().err_postcode);
    document.getElementById("postcode").focus();
    return false;
  }
  // auto-format postcode to "1234 AB ..."
  document.getElementById("postcode").value =
    pcMatch[1] + " " + pcMatch[2].toUpperCase() +
    pc.slice(pcMatch[0].length);
  return true;
}

// auto-format postcode bij blur ook al voor je 'volgende' klikt
function wirePostcodeFormat() {
  const el = document.getElementById("postcode");
  if (!el || el.dataset.wired) return;
  el.dataset.wired = "1";
  el.addEventListener("blur", () => {
    const pc = el.value.trim();
    const m = pc.replace(/\s+/g, " ").match(/^(\d{4})\s?([a-zA-Z]{2})(.*)$/);
    if (m) el.value = m[1] + " " + m[2].toUpperCase() + (m[3] || "");
  });
}

document.querySelectorAll("[data-next]").forEach(btn => {
  btn.addEventListener("click", () => {
    const target = parseInt(btn.getAttribute("data-next"), 10);
    if (currentStep === 1 && !validateStep1()) return;
    // Step 1 -> 2 fires the intake call so the backend can capture the
    // lead and run BAG / energielabel / monument lookups in parallel
    // with the user filling out step 2. We don't block navigation on
    // the intake response. If the lookup is slow we just show step 2
    // immediately. Result lands in `enrichmentResult` for use later.
    if (currentStep === 1 && target === 2) runIntake();
    if (target === 3) {
      runExtraction();
      return;
    }
    showStep(target);
  });
});

/* ===== intake (step 1). Lead capture + public register enrichment ===== */
async function runIntake() {
  if (DEMO) {

/* ===== extraction step ===== */
function setLoaderList(items) {
  const list = document.getElementById("loaderList");
  list.innerHTML = "";
  items.forEach(({ label, done }) => {
    const row = document.createElement("div");
    row.className = "item" + (done ? " done" : "");
    row.innerHTML = `<span class="ico">${done ? "✓" : "•"}</span><span></span>`;
    row.querySelector("span:last-child").textContent = label;
    list.appendChild(row);
  });
}

async function runExtraction() {
  showStep(3);

  const labels = [
    t().loader_step_upload,
    t().loader_step_extract,
    t().loader_step_match,
    t().loader_step_done,
  ];
  setLoaderList(labels.map(l => ({ label: l, done: false })));

  // ---- collect uploads ----
  const fd = new FormData();
  fd.append("lang", lang);
  fd.append("straat", document.getElementById("straat").value);
  fd.append("postcode", document.getElementById("postcode").value);
  fd.append("naam", document.getElementById("naam").value);
  fd.append("email", document.getElementById("email").value);
  fd.append("tel", document.getElementById("tel").value);
  // Forward the enrichment we already fetched at step 1 so the backend
  // can echo it back inside extractionResult.enrichment. The submit
  // route reads it from there for both DB persistence and email body.
  if (enrichmentResult) fd.append("enrichment", JSON.stringify(enrichmentResult));
  Object.keys(uploaded).forEach(key => {
    uploaded[key].forEach(item => {
      // In Block B incremental save, items are wrappers { file, name, size, status, serverId? }.
      // Server-stored items have no local File (already in Supabase Storage) — skip those.
      if (item && item.file instanceof File) {
        fd.append(`file_${key}`, item.file, item.name || item.file.name);
      }
    });
  });

  // animated progression
  const steps = [
    { idx: 0, ms: 600 },
    { idx: 1, ms: 900 },
    { idx: 2, ms: 700 },
    { idx: 3, ms: 400 },
  ];
  for (const s of steps) {
    await new Promise(r => setTimeout(r, s.ms));
    const items = labels.map((l, i) => ({ label: l, done: i <= s.idx }));
    setLoaderList(items);
    if (s.idx === 1) {
      if (DEMO) {
        extractionResult = mockExtraction();
      } else {
        // With Block B incremental save, files live in Supabase Storage —
        // not in the wizard's local state. If ANY upload has `serverId`,
        // there are no File objects to FormData-append; the staff
        // dashboard handles real AI analysis via the Block C endpoint.
        // We skip the legacy /extract call in that case so the seller
        // isn't stuck waiting on a no-op request.
        const hasLocalFiles = Object.values(uploaded).some(arr =>
          arr.some(it => it && it.file instanceof File)
        );
        if (hasLocalFiles) {
          try {
            const res = await fetch(EXTRACT_URL, { method: "POST", body: fd });
            if (res.ok) extractionResult = await res.json();
          } catch (err) {
            console.warn("extract endpoint not available, continuing without prefill", err);
            extractionResult = null;
          }
        }
        // If extraction was skipped or failed, we still want enrichment to
        // flow through to submit. Synthesise a minimal extractionResult.
        if (!extractionResult && enrichmentResult) {
          extractionResult = {
            summary: [],
            skipQuestions: [],
            prefilled: {},
            enrichment: enrichmentResult,
          };
        }
      }
    }
  }

  // re-render questions filtered by skip list, then go to step 4
  rerenderAll();
  showStep(4);

  // Kick off the AI follow-up generation. The whole of step 4's question
  // surface is driven by /api/verkoop/analyse — there is no longer a fixed
  // pool of property questions. Runs async so the seller can start filling
  // out price/handover while the AI thinks (~30-40s on first run).
  if (!DEMO) runAnalyse();
}

// Map server-side error codes from /api/verkoop/analyse to i18n keys so
// the seller sees something actionable. Anything we don't recognise
// falls back to the generic message.
const ANALYSE_ERR_KEY = {
  unauthorized:        "qg_ai_err_auth",
  no_dossier:          "qg_ai_err_no_dossier",
  no_files:            "qg_ai_err_no_dossier",
  no_analysable_files: "qg_ai_err_no_files",
};

let analyseInFlight = false;
async function runAnalyse() {
  if (analyseInFlight) return;
  analyseInFlight = true;
  const loading = document.getElementById("aiQuestionsLoading");
  const empty   = document.getElementById("aiQuestionsEmpty");
  const errBox  = document.getElementById("aiQuestionsError");
  const errText = document.getElementById("aiQuestionsErrorText");
  const section = document.getElementById("aiQuestionsSection");
  if (loading) loading.style.display = "block";
  if (empty)   empty.style.display   = "none";
  if (errBox)  errBox.style.display  = "none";
  if (section) section.style.display = "none";

  function showError(key, diag) {
    if (loading) loading.style.display = "none";
    if (errText) {
      const base = (t() && t()[key]) || (t() && t().qg_ai_err_generic) || "AI analysis failed.";
      errText.textContent = diag ? `${base} (${diag})` : base;
    }
    if (errBox)  errBox.style.display = "block";
  }

  try {
    const res = await fetch("/api/verkoop/analyse", { method: "POST" });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      const key = ANALYSE_ERR_KEY[body?.error] || "qg_ai_err_generic";
      console.warn("[analyse] failed", res.status, body);
      // Surface the server-side code (and short detail if present) inside the
      // red banner. The friendly message keeps its place; the code rides
      // along in parens so devs can diagnose without opening DevTools.
      const codeBits = [body?.error || `http_${res.status}`];
      if (body?.detail) codeBits.push(String(body.detail).slice(0, 120));
      showError(key, codeBits.join(": "));
      return;
    }
    const data = await res.json();
    const qs = Array.isArray(data.seller_questions) ? data.seller_questions : [];
    if (loading) loading.style.display = "none";
    if (qs.length === 0) {
      // Only show the "all covered" message when the AI actually returned
      // an empty list — not when the call errored out.
      if (empty) empty.style.display = "block";
      return;
    }
    // renderAiQuestions un-hides aiQuestionsSection itself.
    renderAiQuestions(qs, {});
  } catch (err) {
    console.warn("[analyse] network error", err);
    const msg = err && err.message ? String(err.message).slice(0, 120) : "network";
    showError("qg_ai_err_generic", `network: ${msg}`);
  } finally {
    analyseInFlight = false;
  }
}

function actuallySaveDraft() {
  try {
    const fields = {};
    document.querySelectorAll("input[type='text'], input[type='email'], input[type='tel'], textarea, select")
      .forEach(el => { if (el.id) fields[el.id] = el.value; });
    const radios = {};
    document.querySelectorAll("input[type='radio']:checked").forEach(el => {
      if (el.name) radios[el.name] = el.value;
    });
    const checks = {};
    document.querySelectorAll("input[type='checkbox']:checked").forEach(el => {
      if (el.name) (checks[el.name] = checks[el.name] || []).push(el.value);
    });
    const state = {
      v: 1,
      lang,
      currentStep,
      fields,
      radios,
      checks,
      skippedDocs: Array.from(skippedDocs),
      extractionResult,
      enrichmentResult,
      leadId,
      uploadedNames: Object.fromEntries(
        Object.entries(uploaded).map(([k, files]) => [k, files.map(f => ({ name: f.name, size: f.size }))])
      ),
    };
    sessionStorage.setItem(STATE_KEY, JSON.stringify(state));
    flashSavedPill();
  } catch (e) { /* sessionStorage may be unavailable */ }
}
function restoreDraft() {
  try {
    const raw = sessionStorage.getItem(STATE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s.v !== 1) return;
    if (s.lang) lang = s.lang;
    if (Array.isArray(s.skippedDocs)) s.skippedDocs.forEach(k => skippedDocs.add(k));
    if (s.extractionResult) extractionResult = s.extractionResult;
    if (s.enrichmentResult) enrichmentResult = s.enrichmentResult;
    if (s.leadId) leadId = s.leadId;
    rerenderAll();
    // restore field values
    Object.entries(s.fields || {}).forEach(([id, v]) => {
      const el = document.getElementById(id);
      if (el) el.value = v;
    });
    Object.entries(s.radios || {}).forEach(([name, val]) => {
      const inp = document.querySelector(`input[type="radio"][name="${CSS.escape(name)}"][value="${CSS.escape(String(val))}"]`);
      if (inp) inp.checked = true;
    });
    Object.entries(s.checks || {}).forEach(([name, vals]) => {
      vals.forEach(v => {
        const inp = document.querySelector(`input[type="checkbox"][name="${CSS.escape(name)}"][value="${CSS.escape(String(v))}"]`);
        if (inp) inp.checked = true;
      });
    });
    // restore step
    if (s.currentStep) showStep(s.currentStep);
  } catch (e) { /* ignore corrupt state */ }
}

/* ===== Toast helper =====
   showToast({type:"error"|"success"|"warn", title, body, ttl}).
   Replaces alert() for non-blocking feedback. Stacks top-right. */
function showToast(opts) {
  const host = document.getElementById("toastHost");
  if (!host) return;
  const el = document.createElement("div");
  el.className = "toast toast-" + (opts.type || "info");
  el.innerHTML = `
    <div class="toast-title"></div>
    <div class="toast-body"></div>
  `;
  el.querySelector(".toast-title").textContent = opts.title || "";
  el.querySelector(".toast-body").textContent = opts.body || "";
  if (!opts.body) el.querySelector(".toast-body").style.display = "none";
  host.appendChild(el);
  setTimeout(() => {
    el.style.transition = "opacity .25s, transform .25s";
    el.style.opacity = "0";
    el.style.transform = "translateX(20px)";
    setTimeout(() => el.remove(), 280);
  }, opts.ttl || 4500);
}

/* ===== Form validation =====
   Runs on Submit click. Returns true if everything's OK, false if missing
   fields. On failure: highlights each invalid field, scrolls to first,
   populates the validation banner with a plain-language list. */
function validateBeforeSubmit() {
  const required = [
    { id: "straat",   labelKey: "field_label_straat",   check: v => v.length >= 3 },
    { id: "postcode", labelKey: "field_label_postcode", check: v => /^\d{4}\s?[A-Za-z]{2}$/.test(v), errKey: "validation_field_postcode" },
    { id: "naam",     labelKey: "field_label_naam",     check: v => v.length >= 2 },
    { id: "email",    labelKey: "field_label_email",    check: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v), errKey: "validation_field_email" },
  ];

  // Clear prior error decoration
  document.querySelectorAll(".invalid").forEach(el => el.classList.remove("invalid"));
  document.querySelectorAll(".field-error").forEach(el => el.remove());

  const missing = [];
  let firstInvalid = null;

  for (const f of required) {
    const el = document.getElementById(f.id);
    if (!el) continue;
    const v = (el.value || "").trim();
    if (!v || !f.check(v)) {
      el.classList.add("invalid");
      const errKey = !v ? "validation_field_required" : (f.errKey || "validation_field_required");
      const msg = document.createElement("div");
      msg.className = "field-error";
      msg.textContent = t()[errKey];
      el.parentElement.appendChild(msg);
      missing.push({ label: t()[f.labelKey], reason: t()[errKey] });
      if (!firstInvalid) firstInvalid = el;
    }
  }

  // Consent checkbox
  const consent = document.getElementById("consent");
  if (!consent.checked) {
    missing.push({ label: t().field_label_consent, reason: t().validation_field_consent });
    if (!firstInvalid) firstInvalid = consent;
  }

  // Typed signature name — legally binding (BW 3:15a), so we require it.
  const sigNaam = document.getElementById("sig_naam");
  if (sigNaam && sigNaam.value.trim().length < 2) {
    sigNaam.classList.add("invalid");
    missing.push({ label: t().sig_name_label, reason: t().sig_name_required });
    if (!firstInvalid) firstInvalid = sigNaam;
  }

  const banner = document.getElementById("validationBanner");
  if (missing.length === 0) {
    if (banner) banner.style.display = "none";
    return true;
  }

  // Populate banner
  if (banner) {
    document.getElementById("validationTitle").textContent = t().validation_title;
    document.getElementById("validationSub").textContent = t().validation_sub;
    const list = document.getElementById("validationList");
    list.innerHTML = "";
    missing.forEach(m => {
      const li = document.createElement("li");
      li.innerHTML = `<strong></strong> — <span></span>`;
      li.querySelector("strong").textContent = m.label;
      li.querySelector("span").textContent = m.reason;
      list.appendChild(li);
    });
    banner.style.display = "block";
  }

  showToast({
    type: "error",
    title: t().validation_title,
    body: missing.length === 1
      ? missing[0].label
      : `${missing.length} ${lang === "nl" ? "velden" : "fields"}`,
  });

  if (firstInvalid) {
    firstInvalid.focus({ preventScroll: true });
    firstInvalid.scrollIntoView({ behavior: "smooth", block: "center" });
  }
  return false;
}

document.getElementById("submitBtn").addEventListener("click", async () => {
  if (!validateBeforeSubmit()) return;

  const fd = new FormData();
  fd.append("lang", lang);
  if (extractionResult) fd.append("extraction", JSON.stringify(extractionResult));
  if (leadId) fd.append("lead_id", leadId);
  ["straat","postcode","naam","email","tel","moment",
   "vraagprijs","oplev","motivatie","lek-toel","vve-sfeer","verbouw-toel"
  ].forEach(id => {
    const el = document.getElementById(id);
    if (el) fd.append(id, el.value);
  });
  Q_GROUPS.forEach(g => {
    t().questions[g].forEach(q => {
      if (q.type === "open") {
        const ta = document.getElementById(q.id);
        if (ta && ta.value) fd.append(q.id, ta.value);
      } else if (q.type === "multiselect") {
        document.querySelectorAll(`input[name="${q.id}"]:checked`).forEach(cb => {
          fd.append(q.id, cb.value);
        });
      } else {
        const sel = document.querySelector(`input[name="${q.id}"]:checked`);
        if (sel) fd.append(q.id, sel.value);
        // followup answers
        const fu = document.getElementById(q.id + "_fu");
        if (fu && fu.value) fd.append(q.id + "_fu", fu.value);
        const amt = document.getElementById(q.id + "_amt");
        if (amt && amt.value) fd.append(q.id + "_amt", amt.value);
      }
    });
  });
  Object.keys(uploaded).forEach(key => {
    uploaded[key].forEach(item => {
      if (item && item.file instanceof File) {
        fd.append(`file_${key}`, item.file, item.name || item.file.name);
      }
    });
  });

  fd.append("consent", "1");

  // Signature payload. Typed name is the legally-binding signature (BW 3:15a).
  // The canvas image is optional and stored as a base64 data URL so the
  // submit handler can persist it on verkoop_dossiers without any extra
  // upload step. sigImage stays empty if the user never drew anything.
  const sigNaam = document.getElementById("sig_naam");
  if (sigNaam && sigNaam.value.trim()) fd.append("signature_name", sigNaam.value.trim());
  if (typeof getSignatureImage === "function") {
    const img = getSignatureImage();
    if (img) fd.append("signature_image", img);
  }
  fd.append("signed_at", new Date().toISOString());

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = t().submitting;
  if (DEMO) {
    await new Promise(r => setTimeout(r, 800));
    btn.textContent = "✓ " + t().submit_done;
    btn.style.background = "#15803D";
    btn.dataset.done = "1";
    sessionStorage.removeItem(STATE_KEY);
    return;
  }
  try {
    const res = await fetch(SUBMIT_URL, { method: "POST", body: fd });
    if (!res.ok) throw new Error("Server error");
    btn.textContent = "✓ " + t().submit_done;
    btn.style.background = "#15803D";
    btn.dataset.done = "1";
    sessionStorage.removeItem(STATE_KEY);
  } catch (err) {
    btn.disabled = false;
    btn.textContent = t().submit_btn;
    alert(t().submit_error);
    console.error(err);
  }
});

/* ===== language toggle =====
   /verkoop is the Dutch URL, /selling is the English URL.
   Toggling languages updates the URL via pushState (no full reload) and
   re-renders all i18n content in place. This keeps the page state (uploads,
   filled fields, scroll position) and is way faster than a real navigation. */
document.querySelectorAll(".lang button").forEach(b => {
  b.addEventListener("click", () => {
    const target = b.getAttribute("data-lang");
    if (target === lang) return;
    lang = target;
    if (location.protocol !== "file:") {
      // Single route /sell — toggle language via ?lang= query so we don't
      // navigate away from the page (and lose form state).
      const qp = new URLSearchParams(location.search);
      qp.set("lang", target);
      try { history.pushState({}, "", location.pathname + "?" + qp.toString() + location.hash); } catch { /* ignore */ }
    }
    rerenderAll();
  });
});

/* Browser back/forward should also resync language to URL. */
window.addEventListener("popstate", () => {
  const qp = new URLSearchParams(location.search);
  const newLang = qp.get("lang") === "en" ? "en" : "nl";
  if (newLang !== lang) {
    lang = newLang;
    rerenderAll();
  }
});
