<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bedankt - ApartmentHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --teal:#009B8A;--teal-dark:#007A6D;--orange:#FF7D28;--orange-dark:#E66C1A;
    --ink:#1A202C;--grey:#4A5568;--grey-soft:#718096;--line:#E2E8F0;--bg:#F7FAFC;--soft:#E8F5F3;
    --radius:14px;--shadow:0 12px 40px rgba(0,102,91,.10),0 2px 8px rgba(26,32,44,.04);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
  .topbar{background:var(--teal);color:#fff;display:flex;align-items:center;padding:14px 22px;position:relative;z-index:2}
  .brand-chip{display:inline-flex;align-items:center;background:#fff;border-radius:11px;padding:8px 14px;box-shadow:0 2px 8px rgba(0,0,0,.14)}
  .topbar .logo{height:30px}
  .logo {
  filter: brightness(0) invert(1);
  width: 100%!important;
  height: auto!important;
  max-width: 200px;
}

  @media (max-width:860px){ .topbar{padding:12px 16px} .brand-chip{padding:7px 12px} .topbar .logo{height:26px} }
  #confetti{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:50}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:2}
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);max-width:480px;width:100%;text-align:center;padding:40px 32px}
  .check{width:84px;height:84px;margin:0 auto 22px;border-radius:50%;background:var(--soft);display:flex;align-items:center;justify-content:center;animation:pop .5s cubic-bezier(.2,1.2,.3,1) both}
  @keyframes pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  h1{font-size:26px;font-weight:800;letter-spacing:-.02em;margin:0 0 12px}
  p{font-size:16px;color:var(--grey);margin:0 0 26px;line-height:1.55}
  .btn{display:inline-flex;align-items:center;gap:9px;background:var(--orange);color:#fff;font-weight:700;font-size:15px;padding:13px 22px;border-radius:11px;text-decoration:none;transition:background .14s}
  .btn:hover{background:var(--orange-dark)}
  .btn.ghost{background:transparent;color:var(--teal-dark);border:1.5px solid var(--line);margin-left:8px}
  .btn.ghost:hover{background:var(--soft)}
  footer{border-top:1px solid var(--line);padding:22px 20px;text-align:center;color:var(--grey-soft);font-size:13px}
  footer a{color:var(--grey-soft);text-decoration:underline}
  @media(max-width:520px){.card{padding:32px 22px}.btn.ghost{margin-left:0;margin-top:10px}}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<header class="topbar">
   <img src="/images/horizontal-logo.png" class="logo" />
</header>

<main>
  <div class="card">
    <div class="check">
      <svg width="38" height="38" viewBox="0 0 38 38"><path d="M11 19.5l5 5L27 13" stroke="#009B8A" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1 id="ty-title">Bedankt voor je aanmelding!</h1>
    <p id="ty-body">Bedankt voor je aanmelding bij ApartmentHub. We hebben je woonwensen ontvangen en nemen contact met je op via WhatsApp.</p>
    <a class="btn" href="https://www.apartmenthub.nl" id="ty-btn">Naar de website</a>
  </div>
</main>

<footer>
  <span>© <span id="yr"></span> ApartmentHub</span> ·
  <a href="https://www.apartmenthub.nl" target="_blank" rel="noopener">apartmenthub.nl</a>
</footer>

<script>
(function(){
  var p = location.pathname.toLowerCase();
  var q = new URLSearchParams(location.search).get('lang');
  var en = q === 'en' || p.indexOf('/en/') !== -1;
  var S = {
    nl:{t:'Bedankt voor je aanmelding!', b:'Bedankt voor je aanmelding bij ApartmentHub. We hebben je woonwensen ontvangen en nemen contact met je op via WhatsApp.', btn:'Naar de website', title:'Bedankt - ApartmentHub', lang:'nl'},
    en:{t:'Thank you for signing up!', b:'Thank you for signing up with ApartmentHub. We have received your preferences and will contact you via WhatsApp.', btn:'Back to website', title:'Thank you - ApartmentHub', lang:'en'}
  };
  var s = en ? S.en : S.nl;
  document.documentElement.lang = s.lang;
  document.title = s.title;
  document.getElementById('ty-title').textContent = s.t;
  document.getElementById('ty-body').textContent = s.b;
  document.getElementById('ty-btn').textContent = s.btn;
  document.getElementById('yr').textContent = '2026';
})();
</script>

<!-- ===== Knallende confetti ===== -->
<script>
(function(){
  var canvas = document.getElementById('confetti');
  var ctx = canvas.getContext('2d');
  var W, H, DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resize(){
    W = canvas.clientWidth; H = canvas.clientHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ApartmentHub-kleuren + feestelijk goud
  var COLORS = ['#009B8A','#FF7D28','#FBBC05','#34A853','#00665B','#E66C1A','#ffffff'];
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var pieces = [];
  var GRAV = 0.16, DRAG = 0.992;

  function burst(cx, cy, count, power){
    for(var i=0;i<count;i++){
      var ang = Math.random() * Math.PI * 2;
      var spd = power * (0.45 + Math.random()*0.85);
      pieces.push({
        x: cx, y: cy,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd - power*0.45,
        w: 6 + Math.random()*7, h: 9 + Math.random()*9,
        rot: Math.random()*Math.PI, vr: (Math.random()-0.5)*0.35,
        color: COLORS[(Math.random()*COLORS.length)|0],
        life: 0, ttl: 150 + Math.random()*90,
        wobble: Math.random()*Math.PI*2
      });
    }
  }

  function fireShow(){
    // Eerste grote knal vanuit het midden-onder, daarna twee zijkanten
    burst(W*0.5, H*0.62, 140, 13);
    setTimeout(function(){ burst(W*0.18, H*0.5, 70, 11); }, 220);
    setTimeout(function(){ burst(W*0.82, H*0.5, 70, 11); }, 380);
    setTimeout(function(){ burst(W*0.5, H*0.4, 80, 12); }, 620);
  }

  function frame(){
    ctx.clearRect(0,0,W,H);
    for(var i=pieces.length-1;i>=0;i--){
      var p = pieces[i];
      p.vx *= DRAG; p.vy = p.vy*DRAG + GRAV;
      p.wobble += 0.12;
      p.x += p.vx + Math.sin(p.wobble)*0.6;
      p.y += p.vy;
      p.rot += p.vr;
      p.life++;
      var alpha = p.life > p.ttl-40 ? Math.max(0,(p.ttl-p.life)/40) : 1;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      if(p.life > p.ttl || p.y > H + 40) pieces.splice(i,1);
    }
    if(pieces.length) requestAnimationFrame(frame);
    else ctx.clearRect(0,0,W,H);
  }

  if(!reduce){
    fireShow();
    requestAnimationFrame(frame);
  }
})();
</script>
</body>
</html>
