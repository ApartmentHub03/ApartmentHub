<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ApartmentHub CRM · Prototype</title><style>
  :root{
    --teal:#009B8A; --teal-d:#007d6f; --teal-l:#e6f5f3;
    --orange:#FF7D28; --orange-l:#fff1e7;
    --ink:#15211f; --muted:#6b7a78; --line:#e7ecec;
    --bg:#f6f8f8; --card:#fff;
    --green:#1faa59; --green-l:#e7f6ed; --amber:#e9a23b; --amber-l:#fdf3e3;
    --red:#e0524b; --red-l:#fdeceb;
    --radius:12px; --shadow:0 1px 3px rgba(16,40,37,.08),0 8px 24px rgba(16,40,37,.05);
    font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  a{color:inherit;cursor:pointer}
  code{background:#eef3f2;border-radius:4px;padding:1px 5px;font-size:.85em}
  .hidden{display:none!important}

  #login{position:fixed;inset:0;background:linear-gradient(135deg,#00b3a0,#007d6f);display:flex;align-items:center;justify-content:center;z-index:50}
  .login-card{background:#fff;border-radius:16px;padding:34px 32px;width:360px;box-shadow:var(--shadow)}
  .login-card h1{font-size:20px;margin:6px 0 2px}.login-card p{color:var(--muted);margin:0 0 18px;font-size:13px}
  .login-card label{display:block;font-size:12px;font-weight:600;margin:12px 0 5px;color:#44524f}
  .login-card input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px}
  .brand-dot{width:36px;height:36px;border-radius:10px;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px}

  .btn{display:inline-flex;align-items:center;gap:7px;justify-content:center;background:var(--teal);color:#fff;font-weight:600;padding:9px 14px;border-radius:9px;font-size:13.5px}
  .btn:hover{background:var(--teal-d)}.btn.full{width:100%;margin-top:18px}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}.btn.ghost:hover{background:#f3f6f6}
  .btn.orange{background:var(--orange);color:#fff}.btn.orange:hover{filter:brightness(.95)}
  .btn.sm{padding:6px 10px;font-size:12.5px}

  .topbar{background:#0e2826;color:#fff;display:flex;align-items:center;gap:12px;padding:11px 20px}
  .topbar .logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .city{background:#16403b;border:1px solid #2a5d55;color:#fff;border-radius:8px;padding:6px 9px;font-size:12.5px}
  .avatar{width:30px;height:30px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .hamb{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
  .bizitem{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:9px;color:#bdd3cf;font-weight:600;cursor:pointer}
  .bizitem:hover{background:#16403b;color:#fff}.bizitem.active{background:var(--teal);color:#fff}
  .tabs{background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:stretch;gap:2px;padding:0 14px;position:sticky;top:0;z-index:10;overflow-x:auto}
  .tab{padding:13px 14px;font-weight:600;font-size:13.5px;color:#46544f;border-bottom:3px solid transparent;white-space:nowrap}
  .tab:hover{color:var(--teal-d)}.tab.active{color:var(--teal);border-bottom-color:var(--teal)}

  .content{padding:24px;max-width:1340px;margin:0 auto}
  h2.page{font-size:21px;margin:0 0 3px}.sub{color:var(--muted);margin:0 0 18px;font-size:13px}
  .ref{display:inline-block;background:var(--teal-l);color:var(--teal-d);font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px;margin-left:8px;vertical-align:middle}
  .ann{background:var(--orange-l);border:1px solid #ffd9bd;border-left:3px solid var(--orange);border-radius:8px;padding:9px 13px;font-size:12px;color:#8a4a17;margin-bottom:16px}.ann b{color:#6f3a12}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .kpi .n{font-size:25px;font-weight:800}.kpi .l{color:var(--muted);font-size:12.5px;margin-top:2px}.kpi .delta{font-size:12px;color:var(--green);font-weight:600}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px}
  .card .hd{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .card .hd h3{margin:0;font-size:15px}.card .hd .sp{margin-left:auto}
  .card .bd{padding:18px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid2-wide{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}

  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);padding:10px 16px;border-bottom:1px solid var(--line)}
  td{padding:12px 16px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:#fafcfc}
  tr.click{cursor:pointer}
  td.grouphd{background:#f3f6f6;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#46544f;font-weight:700;padding:7px 16px}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;border-radius:20px;padding:3px 9px}
  .pill.green{background:var(--green-l);color:#157a3f}.pill.amber{background:var(--amber-l);color:#a4691a}
  .pill.red{background:var(--red-l);color:#b23a34}.pill.teal{background:var(--teal-l);color:var(--teal-d)}
  .pill.grey{background:#eef1f1;color:#54635f}.pill.orange{background:var(--orange-l);color:#8a4a17}
  .tag{display:inline-block;background:#eef1f1;color:#46544f;font-size:11px;border-radius:6px;padding:2px 7px;margin:2px 2px 0 0}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px}
  .d-green{background:var(--green)}.d-amber{background:var(--amber)}.d-red{background:var(--red)}
  .chat{color:var(--teal);font-weight:600}.chat:hover{text-decoration:underline}

  .rechead{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:15px 18px;box-shadow:var(--shadow);margin-bottom:16px}
  .rechead .ico{width:42px;height:42px;border-radius:11px;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-size:19px}
  .rechead .t{font-size:11px;color:var(--muted)}.rechead .h{font-size:19px;font-weight:700}
  .rechead .acts{margin-left:auto;display:flex;gap:7px;flex-wrap:wrap}
  .sections{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px;margin-bottom:16px}
  .subtabs{display:flex;flex-wrap:nowrap;align-items:stretch;gap:4px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:6px;margin-bottom:16px}
  .subtab{flex:1;text-align:center;display:flex;align-items:center;justify-content:center;gap:7px;padding:10px 8px;font-weight:600;font-size:13px;color:#46544f;border-radius:8px;white-space:nowrap}
  .subtab:hover{color:var(--teal-d);background:#f6f8f8}.subtab.active{color:var(--teal);background:var(--teal-l)}
  .fields{display:grid;grid-template-columns:1fr 1fr;gap:0 40px;padding:14px 18px}
  .fr{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid #f1f4f4}
  .fr .lab{width:155px;flex:none;color:var(--muted);font-size:12.5px}.fr .val{flex:1;font-weight:500}
  .fr .pen{opacity:0;color:#c2cccb}.fr:hover .pen{opacity:1}
  .drop{border:2px dashed var(--line);border-radius:10px;padding:16px;display:flex;align-items:center;gap:12px;color:var(--muted);font-size:13px}
  .grp{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden}
  .grp .gh{display:flex;align-items:center;gap:8px;padding:11px 14px;background:#f6f8f8;border-bottom:1px solid var(--line)}
  .grp .gb{padding:12px 14px}
  .role{font-size:11px;font-weight:700;text-transform:uppercase;border-radius:6px;padding:2px 8px}
  .role.t{background:var(--teal-l);color:var(--teal-d)}.role.g{background:var(--orange-l);color:#8a4a17}
  .potfld{width:100%;max-width:300px;border:1px solid transparent;background:#eef3f2;border-radius:8px;padding:6px 9px;font-size:13.5px;font-family:inherit;color:var(--ink)}
  textarea.potfld{max-width:none;min-height:58px;resize:vertical}
  #pot.editing .potfld{border-color:var(--line);background:#fff}
  #pot:not(.editing) .editonly{display:none}
  #pot.editing{outline:2px solid var(--teal-l);outline-offset:6px;border-radius:6px}

  label.f{display:block;font-size:12px;font-weight:600;margin:13px 0 5px;color:#44524f}
  .inp,select.inp,textarea.inp{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:13.5px;font-family:inherit}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .hint{font-size:11.5px;color:var(--muted);margin-top:4px}
  .status-strip{display:flex;align-items:center;gap:10px;background:var(--teal-l);border:1px solid #cfe9e5;border-radius:10px;padding:11px 14px;margin:16px 0;flex-wrap:wrap}
  .step{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--teal-d)}
  .step .num{width:20px;height:20px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px}
  .arrow{color:#9cc;font-weight:700}
  .perm{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:13px}.perm input{width:16px;height:16px;accent-color:var(--teal)}
  .bars{height:110px;display:flex;align-items:flex-end;gap:10px;margin-top:12px}.bars div{flex:1;border-radius:5px 5px 0 0;background:var(--teal)}
  .modal-bg{position:fixed;inset:0;background:rgba(16,40,37,.45);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px}
  .modal{background:#fff;border-radius:14px;max-width:520px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal .mh{display:flex;align-items:center;gap:10px;padding:15px 20px;border-bottom:1px solid var(--line)}.modal .mh h3{margin:0;font-size:16px}
  .modal .mh .x{margin-left:auto;font-size:22px;color:#999;cursor:pointer;line-height:1}
  .modal .mb{padding:18px 20px;font-size:13.5px}.modal .mb p{margin:0 0 10px}
  .modal .mf{padding:13px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid #f1f4f4}.kv .k{color:var(--muted)}
  .linkbox{background:#f6f8f8;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-family:monospace;font-size:12px;margin:5px 0 10px;word-break:break-all}
  .wapreview{background:var(--teal-l);border:1px solid #cfe9e5;border-radius:10px;padding:12px;font-size:13px;white-space:pre-wrap;line-height:1.5}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0e2826;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;z-index:70;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .2s}
  .toast.show{opacity:1}
</style></head><body><div id="login"><div class="login-card"><div class="brand-dot">A</div><h1>ApartmentHub CRM</h1><p>Team login · Amsterdam dashboard</p><label>Email</label><input type="text" value="david@apartmenthub.nl"><label>Password</label><input type="password" value="••••••••"><button class="btn full" onclick="document.getElementById('login').classList.add('hidden')">Sign in</button><p style="margin-top:14px;font-size:11.5px;text-align:center">Per-user login via Supabase Auth.</p></div></div><div class="topbar"><button class="hamb" onclick="toggleDrawer()" title="Business lines">☰</button><div class="logo"><div class="brand-dot">A</div> ApartmentHub CRM</div><div class="right"><select class="city" onchange="alert('Two fully separate dashboards, each with its own login and number.')"><option>Amsterdam · 06 5897 5449</option><option>Utrecht · 06 2372 0769</option></select><span>🔔</span><div class="avatar">D</div></div></div><div id="bizdrawer" class="hidden" style="position:fixed;inset:0;z-index:40"><div onclick="toggleDrawer()" style="position:absolute;inset:0;background:rgba(16,40,37,.45)"></div><div style="position:absolute;left:0;top:0;bottom:0;width:268px;background:#0e2826;padding:18px 14px;display:flex;flex-direction:column;gap:5px"><div style="display:flex;align-items:center;gap:10px;padding:4px 8px 14px;font-weight:700;color:#fff;font-size:15px"><div class="brand-dot">A</div> ApartmentHub</div><div style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#7fb3ab;padding:6px 10px">Business lines</div><a class="bizitem active" data-biz="aanhuur" onclick="setBiz('aanhuur')"><span></span> Rentals (tenant)<span style="margin-left:auto;font-size:10px;background:#16403b;border:1px solid #2a5d55;color:#7fb3ab;border-radius:20px;padding:1px 7px">this CRM</span></a><a class="bizitem" data-biz="verhuur" onclick="setBiz('verhuur')"><span></span> Letting (landlord)</a><a class="bizitem" data-biz="aankoop" onclick="setBiz('aankoop')"><span></span> Buying</a><a class="bizitem" data-biz="verkoop" onclick="setBiz('verkoop')"><span></span> Selling</a></div></div><div class="tabs" id="tabs"></div><div class="content" id="content"></div><div id="modalroot"></div><div id="toast" class="toast"></div><script>
const TABS=[
  {id:'dashboard',label:'Dashboard'},
  {id:'apartments',label:'Apartments'},
  {id:'deals',label:'Deals this month'},
  {id:'candidates',label:'Candidates'},
  {id:'leads',label:'Marketing'},
  {id:'seo',label:'SEO'},
  {id:'agents',label:'Agents'},
  {id:'collab',label:'Collaborations'},
  {id:'team',label:'Team'},
];
const views={};

/* DASHBOARD */
let dashRole='admin';
function setDashRole(r){dashRole=r;show('dashboard');}
views.dashboard=()=>{const A=dashRole==='admin';return `
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:4px"><h2 class="page" style="margin:0">Dashboard</h2><span class="hint">View as</span><select class="inp" style="width:auto;padding:6px 9px" onchange="setDashRole(this.value)"><option value="admin"${A?' selected':''}>Admin (David)</option><option value="agent"${A?'':' selected'}>Agent (Lander)</option></select></div><p class="sub">Amsterdam · ${A?'admin view · full company overview':'agent view · your own work only · company financials are hidden'}.</p><div class="kpis">${A
    ? kpi('12','Active apartments','')+kpi('128','Candidates','+9 today')+kpi('7','Viewings this week','')+kpi('3','Offers out','1 awaiting deal')
    : kpi('3','My apartments','')+kpi('2','My viewings this week','')+kpi('2','My offers in','')+kpi('1','My offers out','')}</div><div class="grid2-wide">
    ${A
    ? `<div class="card"><div class="hd"><h3>Forecast &amp; earnings</h3><span class="pill teal sp">Admin only</span></div><div class="bd"><div style="display:flex;gap:24px;align-items:flex-end"><div style="flex:1"><div class="hint">Forecast (next months)</div><div class="bars"><div style="height:45%"></div><div style="height:60%"></div><div style="height:78%"></div><div style="height:92%"></div></div></div><div style="text-align:right"><div class="hint">Earned this month</div><div style="font-size:30px;font-weight:800">€ 9.400</div><div class="hint">€ 48.250 this year · 7 deals</div></div></div><div class="hint" style="margin-top:10px">Financial dashboard · <b>admins only</b>. Not part of the current build to connect (later).</div></div></div>`
    : `<div class="card"><div class="hd"><h3>My bids &amp; offers</h3></div><div class="bd" style="padding:8px 18px">
        ${rel('Sara &amp; Tom · Keizersgracht 12','Offers In · Bid #2','<button class="btn sm">Generate offer</button>')}
        ${rel('A. Yilmaz · Keizersgracht 12','Offers Out · sent 2 days ago','<span class="pill amber">Awaiting</span>')}
        <div class="hint" style="margin-top:8px">As an agent you handle the bids that come in · company financials are hidden.</div></div></div>`}
    <div class="card"><div class="hd"><h3>Notifications</h3><span class="ref">point 19</span></div><div class="bd"><div style="display:flex;gap:9px;margin-bottom:11px"><span class="pill orange">●</span><div><b>New bid received</b><div class="hint">Lukas Norman · Keizersgracht 12</div></div></div><div style="display:flex;gap:9px;margin-bottom:11px"><span class="pill teal">●</span><div>New booking · facetime viewing<div class="hint">Today 16:00</div></div></div><div style="display:flex;gap:9px"><span class="pill green">●</span><div>Application complete · ready to generate offer<div class="hint">Sara &amp; Tom</div></div></div></div></div></div><div class="grid2"><div class="card"><div class="hd"><h3>Offers awaiting response</h3></div><div class="bd" style="padding:6px 18px 10px">
      ${rel('A. Yilmaz · Keizersgracht 12','Sent 2 days ago · € 1.700','<span class="pill amber">Awaiting</span>')}
      ${rel('R. Visser · Da Costakade 21','Sent 1 day ago · € 1.850','<span class="pill amber">Awaiting</span>')}</div></div><div class="card"><div class="hd"><h3>Upcoming viewings</h3></div><div class="bd" style="padding:6px 18px 10px">
      ${rel('Lukas Norman · Keizersgracht 12','In-person','<b>Tue 14:00</b>')}
      ${rel('Sara &amp; Tom · Prinsengracht 88','Facetime','<b>Today 16:00</b>')}</div></div></div>`;};
const kpi=(n,l,d)=>`<div class="kpi"><div class="n">${n}</div><div class="l">${l}</div>${d?`<div class="delta">${d}</div>`:''}</div>`;

/* APARTMENTS · full list, active on top, not active below. Click → record */
views.apartments=()=>`
  <h2 class="page">Apartments</h2><p class="sub">Grouped as a pipeline: viewing just went (past week) → waiting for offers → offers out → deals (won/failed). The <b>neighborhood</b> is auto-generated from the address, so you can quickly match an apartment to a candidate's preferred area. Apartments drop to <b>Not active</b> automatically 2 weeks after the viewing if nothing more happened, so they no longer need attention. Click an apartment for the full record.</p><div class="card"><div class="hd"><h3>Apartments</h3><span class="hint sp">12 items</span><button class="btn sm" style="margin-left:12px" onclick="show('create')">+ New apartment</button></div><div class="bd" style="padding:0"><table><tr><th>Apartment</th><th>Neighborhood</th><th>Viewing moment</th><th>Price</th><th>Realtor</th><th>Agent</th><th>Joined</th><th>Offers in</th><th>Offers out</th><th>Status</th></tr><tr><td class="grouphd" colspan="10">Active · viewing just went (past week)</td></tr>
    ${arow('Keizersgracht 12','Grachtengordel','Tue 18 Jun, 14:00','€1.850','De Vries Makelaars','David','5','2','1','Active','green')}
    ${arow('Govert Flinckstraat 357-H','De Pijp','Wed 19 Jun, 11:00','€2.600','·','Lander','2','2','0','Active','green')}
    <tr><td class="grouphd" colspan="10">Waiting for offers</td></tr>
    ${arow('Da Costakade 21','Oud-West','Thu 20 Jun, 16:30','€1.700','Grachtenhuis','Lander','4','0','0','Waiting','amber')}
    <tr><td class="grouphd" colspan="10">Offers out</td></tr>
    ${arow('Weteringschans 9','Centrum','Mon 17 Jun, 10:00','€1.950','De Vries Makelaars','Kaj','3','3','2','Offers out','teal')}
    <tr><td class="grouphd" colspan="10">Deals · won / failed (mixed)</td></tr>
    ${arow('Prinsengracht 88','Grachtengordel','Fri 14 Jun, 13:00','€2.100','·','Lander','6','4','1','Deal won','green')}
    ${arow('Marnixstraat 220','Jordaan','Sat 15 Jun, 12:00','€1.600','Grachtenhuis','Lucas','2','1','1','Deal failed','red')}
    <tr><td class="grouphd" colspan="10">Not active · viewing was 2+ weeks ago, nothing more to do (low priority)</td></tr>
    ${arow('Vijzelstraat 5','Centrum','Wed 04 Jun, 10:00','€1.450','·','Lucas','2','0','0','Not active','grey')}
    ${arow('Weteringschans 22','Centrum','Mon 02 Jun, 14:00','€1.500','·','Kaj','1','0','0','Not active','grey')}
  </table></div></div>`;
const arow=(n,c,v,p,realtor,agent,j,oi,oo,s,col)=>`<tr class="click" onclick="show('record')"><td><a style="color:var(--teal);font-weight:600">${n}</a></td><td>${c}</td><td>${v==='·'?'<span class="hint">·</span>':'<b>'+v+'</b>'}</td><td>${p}</td><td>${realtor==='·'?'<span class="hint">·</span>':realtor}</td><td>${agent==='·'?'<span class="hint">·</span>':'<b>'+agent+'</b>'}</td><td>${j>0?`<span class="pill green">${j}</span>`:'<span class="hint">0</span>'}</td><td>${oi}</td><td>${oo}</td><td><span class="pill ${col}">${s}</span></td></tr>`;

/* DEALS THIS MONTH (won) */
views.deals=()=>`

/* LEAD / APPLICATION DETAIL · the "server": all people + their documents */
const fld=(l,v)=>`<div style="display:flex;gap:10px;align-items:center;padding:5px 0"><div style="width:150px;color:var(--muted);font-size:12.5px">${l}</div><input class="potfld" readonly value="${v}"></div>`;
const docrow=(nm,st)=> st==='missing'
  ? `<div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f1f4f4"><span class="dot d-amber"></span><span style="flex:1;font-size:13px;color:#8a6f6c">${nm}</span><span class="pill amber">Missing</span><button class="btn ghost sm editonly" onclick="toast('Upload ${nm} (demo)')">Upload</button></div>`
  : `<details style="border-bottom:1px solid #f1f4f4"><summary style="display:flex;align-items:center;gap:8px;padding:9px 0;cursor:pointer;list-style:none"><span class="dot d-${st}"></span><span style="flex:1;font-size:13px">${nm}</span><span class="hint">▾ preview</span><button class="btn ghost sm" onclick="event.stopPropagation();event.preventDefault();toast('Downloading ${nm}')"></button><button class="btn ghost sm editonly" style="color:var(--red)" title="Remove" onclick="event.stopPropagation();event.preventDefault();this.closest('details').remove();toast('Removed ${nm}')"></button></summary><div style="padding:6px 0 12px 17px;display:grid;grid-template-columns:1.3fr 1fr;gap:10px"><div style="background:#fff;border:1px solid var(--line);border-radius:8px;height:120px;padding:11px;font-size:10px;color:#b9c2c0;overflow:hidden;line-height:1.8">PDF preview · ${nm}<br>──────────────<br>────────<br>───────────────<br>─────────<br>────────────</div><div style="background:#f6f8f8;border:1px solid var(--line);border-radius:8px;padding:11px;font-size:12px"><b>AI read</b><div class="hint" style="margin-top:5px">Matched ✓ name, amount &amp; date against the bid. Open to verify the document yourself.</div></div></div></details>`;
const reqdocs=(names,inc)=>names.map((n,i)=>docrow(n, inc?(i===0?'amber':'missing'):'green'));
/* Required documents per work status (from src/config/documentRequirements.js) */
const REQ={
  werknemer:['ID Document (passport / ID)','Employment contract or employer statement','Salary slips (last 3)'],
  student:['ID Document (passport / ID)','Proof of study enrollment'],
  ondernemer:['ID Document (passport / ID)','Annual statements (last 1-2 years)'],
  pensioen:['ID Document (passport / ID)','Pension proof','Bank statement (pension deposit)'],
};
const person=(nm,role,cls,fields,docs)=>`<div class="grp"><div class="gh"><b>${nm}</b><span class="role ${cls}">${role}</span><span style="margin-left:auto;display:flex;gap:6px"><button class="btn ghost sm editonly">+ Add doc</button><button class="btn ghost sm">ZIP</button></span></div><div class="gb">${fields.length?fields.map(x=>fld(x[0],x[1])).join('')+'<div class="hint" style="margin:8px 0 4px">Documents</div>':''}${docs.join('')}</div></div>`;
const fromLabel={making:'People Making an Offer',offersin:'Offers In',offersout:'Offers Out'};
const APPDETAIL=(name,from)=>`
  <div style="margin-bottom:10px"><a style="color:var(--teal);font-weight:600;cursor:pointer" onclick="recTab('${from}')">‹ Back to ${fromLabel[from]||'list'}</a></div><div class="card"><div class="hd"><h3>Application · ${name}</h3><span class="ref">group / "server" · point 6</span><button class="btn ghost sm" id="adjustBtn" style="margin-left:auto" onclick="toggleAdjust()">Adjust Offer</button></div><div class="bd"><div id="pot"><div class="hint" style="margin-bottom:10px">Viewing attended · Tue 18 Jun 2026, 14:00 · read-only until you click <b>Adjust Offer</b> (top-right)</div>
    ${from==='making'
      ? '<div style="background:var(--amber-l);border:1px solid #f3dca6;border-radius:9px;padding:9px 12px;font-size:12.5px;color:#8a5a12;margin-bottom:14px"><span class="dot d-amber"></span><b>Several required documents are still missing</b> · see the orange "Missing" items per person below. Each person shows their full required-document checklist.</div>'
      : '<div style="background:var(--green-l);border:1px solid #c6ecd3;border-radius:9px;padding:9px 12px;font-size:12.5px;color:#157a3f;margin-bottom:14px"><span class="dot d-green"></span><b>All required documents are in.</b></div>'}
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--teal-l);border:1px solid #cfe9e5;border-radius:10px;padding:10px 13px;margin-bottom:14px"><b style="font-size:13px">Generate offer:</b><button class="btn sm">Normal</button><button class="btn ghost sm">Hausing</button><button class="btn ghost sm">Grand relocation</button><span class="hint" style="flex-basis:100%;margin-top:4px">Opens the draft for review · AI writes it in Dutch, you check it over before sending. Default type from the realtor. Later via an MCP server to Chesney · not for Abi yet.</span></div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px"><button class="btn ghost sm">Download all (ZIP)</button><button class="btn ghost sm editonly">+ Add document</button></div><div class="grp"><div class="gh"><b>Bid details</b><span class="hint">· exactly as submitted on /aanvraag</span></div><div class="gb">
      ${fld('Offered rent (€)','1.900')}${fld('Deposit (€)','3.800')}${fld('Start date','01-08-2026')}${fld('Candidate type','2 working people')}${fld('Total income (€/mo)','6.400')}
      <label class="f" style="margin-top:6px">Motivation</label><textarea class="potfld" readonly>We love the location and would like to make this our home.</textarea></div></div>

    ${person('Bid &amp; contract','Bid','t',[],reqdocs(['Signed Letter of Intent','Generated Offer (PDF)'],from==='making'))}
    ${person('Sara Jansen','Main Tenant','t',[['Date of birth','12-03-1994'],['Work status','Employee'],['Employer','ING Bank'],['Income (€/mo)','3.400']],reqdocs(REQ.werknemer,from==='making'))}
    ${person('Tom de Boer','Co-Tenant','t',[['Date of birth','05-07-1993'],['Work status','Entrepreneur'],['Income (€/mo)','3.000']],reqdocs(REQ.ondernemer,from==='making'))}
    ${person('Kristine Hambrouck','Guarantor','g',[['Relationship','Mother'],['Work status','Employee'],['Employer','UNHCR'],['Contract','Indefinite'],['Income (€/yr)','USD 315.917']],reqdocs(REQ.werknemer,from==='making'))}
    <div class="hint" style="margin-top:6px">Each person is a separate box (Bid &amp; contract, Main Tenant, Co-Tenant, Guarantor) with their own fields and documents. Click <b>Adjust Offer</b> (top-right) to edit fields and remove documents · otherwise it stays read-only. Each document expands for a preview to check it against what the AI read.</div></div></div></div>`;
function recLead(name,from,edit){document.getElementById('recsec').innerHTML=APPDETAIL(name,from);if(edit)setAdjust(true);}
function setAdjust(on){const p=document.getElementById('pot');if(!p)return;p.classList.toggle('editing',on);p.querySelectorAll('.potfld').forEach(i=>i.readOnly=!on);const b=document.getElementById('adjustBtn');if(b)b.textContent=on?'✓ Done':'Adjust Offer';}
function toggleAdjust(){const p=document.getElementById('pot');setAdjust(!p.classList.contains('editing'));}

/* router */
function show(v){
  document.getElementById('content').innerHTML=(views[v]||views.dashboard)();
  const activeTab = (v==='record'||v==='create') ? 'apartments' : v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.view===activeTab));
  if(v==='record') recTab('scheduled');
  window.scrollTo(0,0);
}
const tabsEl=document.getElementById('tabs');
TABS.forEach(t=>{const a=document.createElement('a');a.className='tab';a.dataset.view=t.id;a.textContent=t.label;a.onclick=()=>show(t.id);tabsEl.appendChild(a);});

/* ---- interactive buttons: modals + toast ---- */
function openModal(h){document.getElementById('modalroot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">${h}</div>`;}
function closeModal(){document.getElementById('modalroot').innerHTML='';}
let _toastT;function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(_toastT);_toastT=setTimeout(()=>e.classList.remove('show'),2400);}
const modalShell=(title,body,footer)=>`<div class="modal"><div class="mh"><h3>${title}</h3><span class="x" onclick="closeModal()">×</span></div><div class="mb">${body}</div>${footer?`<div class="mf">${footer}</div>`:''}</div>`;

const SEGMENTS=[
  ['Customer €1500 · €2000 & 1 Bedroom','1.204'],['Customer €1500 · €2000 & 2 Bedroom','1.951'],['Customer €1500 · €2000 & 3 Bedroom','785'],
  ['Customer €2000 · €2500 & 1 Bedroom','608'],['Customer €2000 · €2500 & 2 Bedroom','1.377'],['Customer €2000 · €2500 & 3 Bedroom','512'],
  ['Customer €2500 · €3000 & 1 Bedroom','412'],['Customer €2500 · €3000 & 2 Bedroom','660'],['Customer €2500 · €3000 & 3 Bedroom','624'],
  ['Customer €3000 · €3500 & 1 Bedroom','221'],['Customer €3000 · €3500 & 2 Bedroom','340'],['Customer €3000 · €3500 & 3 Bedroom','298'],
  ['Customer €3500 · €4000 & 2 Bedroom','176'],['Customer €3500 · €4000 & 3 Bedroom','139'],['Customer €4000 · €4500 & 3 Bedroom','86'],
];
const segRow=(name,count,idx,checked)=>`<label class="segrow" style="display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:1px solid #f1f4f4;cursor:pointer"><input type="checkbox" ${checked?'checked':''} data-idx="${idx}" onchange="segSync(this)" style="accent-color:var(--teal)"><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:12.5px">${name}</div><div class="hint" style="font-size:11px">last updated today</div></div><span class="pill grey" style="min-width:48px;justify-content:center">${count}</span></label>`;
const shortSeg=(name)=>name.replace('Customer ','').replace(' & ',' · ').replace(' Bedroom','BR');
const chipHtml=(name,count,idx)=>`<span class="tag" style="background:var(--teal-l);color:var(--teal-d);display:inline-flex;align-items:center;gap:6px;font-size:11.5px;padding:3px 9px;white-space:nowrap"><b>${shortSeg(name)}</b> ${count} <span class="segx" data-idx="${idx}" onclick="uncheckSeg(this)" style="cursor:pointer;font-weight:800">×</span></span>`;
function segPicker(matchName){
  const mi=SEGMENTS.findIndex(s=>s[0]===matchName);
  const chipsInit=mi>=0?chipHtml(SEGMENTS[mi][0],SEGMENTS[mi][1],mi):'<span class="hint">No segments selected yet · click the search bar to add.</span>';
  return `<div class="segpick" style="border:2px solid var(--teal);border-radius:12px;overflow:hidden;max-width:640px;box-shadow:var(--shadow)"><div style="display:flex;align-items:center;gap:8px;padding:10px 13px;background:var(--teal);color:#fff"><b style="font-size:13px">Send to segments</b><span class="segcount" style="margin-left:auto;background:#fff;color:var(--teal-d);border-radius:20px;padding:1px 10px;font-weight:700;font-size:12px">${mi>=0?1:0} selected</span></div><div style="display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:#fafcfc"><div style="display:flex;align-items:center;gap:7px;flex:none;width:230px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 9px"><span style="color:var(--muted)">⌕</span><input style="border:none;outline:none;background:transparent;flex:1;min-width:0;font-size:13px;font-family:inherit" placeholder="Search segments" onfocus="segOpen(this)" oninput="filterSeg(this)"></div><div class="segchips" style="display:flex;flex-wrap:wrap;gap:6px;flex:1;align-items:center;min-height:34px">${chipsInit}</div></div><div class="segcollapse" style="display:none;border-top:1px solid var(--line)"><div class="seglist" style="max-height:200px;overflow-y:auto">${SEGMENTS.map((s,i)=>segRow(s[0],s[1],i,i===mi)).join('')}</div><div style="padding:8px 12px;border-top:1px solid var(--line);background:#fafcfc;font-size:11px;color:var(--muted)">Standard exclusions: <b>OPT_OUT · ARCHIVED · Almere · Rotterdam</b>. <label style="color:var(--ink)"><input type="checkbox" style="accent-color:var(--teal)"> exclude <b>Students</b></label>. Max 1 apartment per segment per day.</div></div></div>`;
}
function segOpen(inp){inp.closest('.segpick').querySelector('.segcollapse').style.display='block';}
function filterSeg(inp){const q=inp.value.toLowerCase();inp.closest('.segpick').querySelector('.seglist').querySelectorAll('.segrow').forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(q)?'':'none';});}
function segSync(cb){const pick=cb.closest('.segpick');const checked=[...pick.querySelectorAll('.seglist input[type=checkbox]:checked')];pick.querySelector('.segcount').textContent=checked.length+' selected';const chips=pick.querySelector('.segchips');chips.innerHTML=checked.length?checked.map(c=>chipHtml(SEGMENTS[c.dataset.idx][0],SEGMENTS[c.dataset.idx][1],c.dataset.idx)).join(''):'<span class="hint">No segments selected yet · click the search bar to add.</span>';}
function uncheckSeg(el){const pick=el.closest('.segpick');const cb=pick.querySelector('.seglist input[data-idx="'+el.dataset.idx+'"]');if(cb){cb.checked=false;segSync(cb);}}

2 bedrooms · 68 m² · € 1.850 / month
Book a viewing: cal.com/apartmenthub/keizersgracht-12-in-person
Brochure (PDF) attached</div><p class="hint" style="margin-top:8px">Goes to the segment via the Zoko Segment API · full automation lands once the Segment API is live. The link is city-aware (Utrecht vs Amsterdam).</p>`,

function modalOffer(type){
  const t=/Hausing/i.test(type)?'Hausing':(/Grand/i.test(type)?'Grand relocation':'Normal');
  const desc={
    'Normal':'Uses the existing email templates (the set delivered to Aniel). The AI fills them in and drafts the offer in the email · always in Dutch.',
    'Hausing':'Generates the PDF that contains the Hausing application (via the existing <code>/hausing-offer</code> skill), bundled with the documents to enter on Hausing.',
    'Grand relocation':'Submitted to the external website, then a PDF is sent to the candidate via WhatsApp.'
  }[t];
  const done={'Normal':'drafted in the email','Hausing':'Hausing PDF generated','Grand relocation':'sent to website · PDF via WhatsApp'}[t];
  openModal(modalShell('Generate offer · '+t,
    `<p>${desc}</p><p class="hint">The actual integration is built by the developer · the button and this popup are the placeholder for now. Later wired via an MCP server to Chesney.</p>`,
    `<button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="closeModal();toast('${t} offer · ${done} (demo)')">Generate ${t} offer</button>`));}

function modalDeal(){openModal(modalShell('Mark as deal · closed conditions',
  `<p>Confirm the agent and the final closed-deal conditions.</p><label class="f">Closing agent</label><select class="inp"><option>Lander</option><option>David</option><option>Kaj</option><option>Lucas</option></select><div class="row"><div><label class="f">Contractual Start Date *</label><input class="inp" type="date"></div><div><label class="f">Rent price (€) · if changed</label><input class="inp" value="1.700"></div></div><p class="hint" style="margin-top:8px">On confirm: accepted template to the winner, declined templates to the others, added to the deals-of-this-month sheet, and the invoice becomes available.</p>`,
  `<button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="closeModal();toast('Deal closed · conditions saved · templates sent')">Confirm deal</button>`));}

document.addEventListener('click', e=>{
  const b=e.target.closest('.btn');
  if(!b || b.getAttribute('onclick')) return;
  const t=b.textContent.trim();
  if(/Generate Meeting Links/i.test(t)) return modalLinks();
  if(/^Send( via WhatsApp)?$/i.test(t)) return modalSend();
  if(/Reschedule/i.test(t)) return modalReschedule();
  if(/Generate offer/i.test(t)) return modalOffer('Normal');
  if(/^(Normal|Hausing|Grand relocation)$/i.test(t)) return modalOffer(t);
  if(/^Deal$/i.test(t)) return modalDeal();
  if(/Add doc|Add document/i.test(t)) return modalUpload();
  if(/Upload$|^Upload/i.test(t)) return modalUpload();
  toast(t.replace(/\s+/g,' ')+' · demo action');
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
document.addEventListener('click', e=>{ if(!e.target.closest('.segpick')) document.querySelectorAll('.segcollapse').forEach(c=>c.style.display='none'); });
function toggleDrawer(){document.getElementById('bizdrawer').classList.toggle('hidden');}
function setBiz(b){
  toggleDrawer();
  document.querySelectorAll('.bizitem').forEach(i=>i.classList.toggle('active', i.dataset.biz===b));
  if(b==='aanhuur'){document.getElementById('tabs').style.display='';show('dashboard');return;}
  document.getElementById('tabs').style.display='none';
  const names={verhuur:'Letting (landlord)',aankoop:'Buying',verkoop:'Selling'};
  document.getElementById('content').innerHTML=`<div class="card"><div class="bd" style="text-align:center;padding:46px 24px"><div style="font-size:30px">${b==='verhuur'?'':b==='aankoop'?'':''}</div><h2 class="page" style="margin-top:8px">${names[b]}</h2><p class="sub">A separate business line with its own dashboard. Not part of this rentals (tenant) CRM build · placeholder for now.</p><button class="btn" onclick="setBiz('aanhuur')">‹ Back to Rentals CRM</button></div></div>`;
}

show('dashboard');
